                                    </div>
                                </div>
                                <div className="flex justify-between items-center gap-2 w-full">
                                    <button onClick={()=>setTime(t=>t+60)} className="px-3 py-3 rounded-lg bg-neutral-900 border border-neutral-800 text-blue-400 font-bold text-[11px] whitespace-nowrap active:scale-95 flex items-center gap-1"><Plus size={14}/> 1 MIN</button>
                                    <button onClick={()=>setIsTimerRunning(!isTimerRunning)} className={`flex-1 py-3 rounded-lg font-black text-black flex justify-center items-center gap-1.5 text-[11px] shadow-lg active:scale-95 ${isTimerRunning?'bg-yellow-400':'bg-green-500'}`}>
                                        {isTimerRunning ? <><Pause size={16}/> PAUSAR TEMPO</> : <><Play size={16}/> INICIAR TEMPO</>}
                                    </button>
                                </div>
                            </div>

                            <div className="hidden md:flex w-full items-center justify-between mt-2">
                                <div className="flex gap-2">
                                    <button onClick={()=>setIsUndoMode(!isUndoMode)} className={`px-3 py-2 rounded-lg text-xs font-black uppercase flex items-center gap-2 border transition-all shadow-md active:scale-95 ${isUndoMode?'bg-red-600 text-white border-red-500 animate-pulse':'bg-neutral-800 border-neutral-700 text-neutral-400'}`}>
                                        <Eraser size={16}/> {isUndoMode?'REMOVER EVENTOS':'CORRIGIR ERRO'}
                                    </button>
                                    <button onClick={handleResetMatch} className="px-3 py-2 rounded-lg bg-neutral-800 border border-neutral-700 text-slate-300 active:scale-95 flex items-center gap-2 text-xs font-bold"><ArrowsClockwise size={16}/> REINICIAR</button>
                                </div>

                                <div className="flex items-center gap-6">
                                    <div className="flex items-center gap-3">
                                        <h2 className="text-2xl font-black text-green-500 uppercase truncate max-w-[150px] text-right">{teams.A.name}</h2>
                                        <FlagImage code={teams.A.flag} className="w-12 h-8" />
                                    </div>
                                    <div className="flex flex-col items-center bg-black/40 px-8 py-2 rounded-2xl border border-neutral-800">
                                        <div className="text-6xl font-black font-mono flex items-center gap-4">{teams.A.goals}<span className="text-neutral-700 text-3xl">:</span>{teams.B.goals}</div>
                                        <div className="flex items-center gap-2 text-yellow-400 font-mono font-black text-xl mt-1 tracking-tighter"><Clock size={18} className={isTimerRunning?"animate-pulse":""}/> {formatTime(time)}</div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <FlagImage code={teams.B.flag} className="w-12 h-8" />
                                        <h2 className="text-2xl font-black text-yellow-400 uppercase truncate max-w-[150px]">{teams.B.name}</h2>
                                    </div>
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={()=>setTime(t=>t+60)} className="px-3 py-2 rounded-lg bg-neutral-900 border border-neutral-800 text-blue-400 font-bold text-xs flex items-center gap-1 active:scale-95"><Plus size={14}/> 1 MIN</button>
                                    <button onClick={()=>setIsTimerRunning(!isTimerRunning)} className={`px-4 py-2 rounded-lg font-black text-black flex items-center gap-2 shadow-lg active:scale-95 ${isTimerRunning?'bg-yellow-400':'bg-green-500'}`}>
                                        {isTimerRunning ? <><Pause size={16}/> PAUSAR</> : <><Play size={16}/> INICIAR TEMPO</>}
                                    </button>
                                    <button onClick={saveMatch} disabled={isSaving} className="px-4 py-2 rounded-lg bg-red-600 text-white font-bold text-xs flex items-center gap-2 shadow-lg active:scale-95 disabled:opacity-50">{isSaving?<Clock size={16}/>:<Flag size={16}/>} FIM</button>
                                </div>
                            </div>

                            <div className="flex md:hidden w-full items-center justify-between mt-2 px-2 border-t border-neutral-800 pt-4">
                                <div className="flex flex-col items-center gap-1">
                                    <FlagImage code={teams.A.flag} className="w-8 h-5" />
                                    <h2 className="text-[10px] font-black text-green-500 uppercase truncate w-20 text-center">{teams.A.name}</h2>
                                </div>
                                <div className="text-5xl font-black font-mono flex items-center gap-3">
                                    <span>{teams.A.goals}</span><span className="text-neutral-700 text-2xl">:</span><span>{teams.B.goals}</span>
                                </div>
                                <div className="flex flex-col items-center gap-1">
                                    <FlagImage code={teams.B.flag} className="w-8 h-5" />
                                    <h2 className="text-[10px] font-black text-yellow-400 uppercase truncate w-20 text-center">{teams.B.name}</h2>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 flex-1">
                            {['A', 'B'].map((t) => (
                                <div key={t} className={`col-span-1 lg:col-span-4 bg-[#0d0d0d] border-t-4 rounded-2xl flex flex-col h-[420px] md:h-auto overflow-hidden ${t==='A'?'border-green-500':'border-yellow-400'}`}>
                                    <div className="p-3 border-b border-neutral-800 text-center font-bold uppercase text-[10px] text-neutral-500 flex items-center justify-center gap-2 uppercase tracking-widest"><FlagImage code={teams[t].flag} className="w-4 h-3"/> {t==='A'?'MANDANTE':'VISITANTE'}</div>
                                    <div className="flex-1 overflow-y-auto p-2 space-y-2 no-scrollbar">
                                        {teams[t].players.map(p=>(
                                            <div key={p.id} className={`bg-[#050505] p-2 rounded-xl border border-neutral-800 transition-all ${animatingPlayer===p.id?'animate-pop':''} ${p.reds>0?'opacity-30':''}`}>
                                                <div className="flex justify-between items-center mb-1.5">
                                                    <div className="flex items-center gap-2"><span className={`font-mono text-[9px] px-1.5 py-0.5 rounded text-black font-black ${t==='A'?'bg-green-500':'bg-yellow-400'}`}>{p.number}</span><span className="font-bold text-[11px] text-white uppercase truncate max-w-[80px]">{p.name}</span></div>
                                                    <div className="flex gap-1 items-center">
                                                        {motm?.id===p.id&&<Award size={14} className="text-yellow-400"/>}
                                                        {Array.from({length:p.goals||0}).map((_,i)=><span key={`g${i}`} className="text-[10px]">⚽</span>)}
                                                        {Array.from({length:p.fouls||0}).map((_,i)=><span key={`f${i}`} className="text-[10px] opacity-70">❗</span>)}
                                                        {Array.from({length:p.yellows||0}).map((_,i)=><div key={`y${i}`} className="w-1.5 h-2.5 bg-yellow-400 rounded-sm shadow-sm shadow-yellow-500/20"></div>)}
                                                        {p.reds>0&&<div className="w-1.5 h-2.5 bg-red-500 rounded-sm shadow-sm shadow-red-500/20"></div>}
                                                    </div>
                                                </div>
                                                {(p.reds === 0 || isUndoMode) && (
                                                    <div className="grid grid-cols-6 gap-1 pt-1.5 border-t border-neutral-900">
                                                        {isUndoMode ? <div className="py-1.5"></div> : <button onClick={()=>setMotm(p)} className="py-1.5 bg-[#111] text-neutral-500 rounded flex justify-center active:scale-90" title="Melhor da Partida"><Star size={12}/></button>}
                                                        <button onClick={()=>handlePlayerAction(t,p.id,'GOAL')} className={`py-1.5 rounded font-black text-[10px] flex justify-center items-center active:scale-90 ${isUndoMode?'bg-red-900/20 text-red-500':'bg-neutral-800 text-green-500'}`} title="Gol">{isUndoMode?'-⚽':'⚽'}</button>
                                                        <button onClick={()=>handlePlayerAction(t,p.id,'ASSIST')} className={`py-1.5 rounded font-black text-[10px] flex justify-center items-center active:scale-90 ${isUndoMode?'bg-red-900/20 text-red-500':'bg-neutral-800 text-blue-400'}`} title="Assistência">{isUndoMode?'-🤝':'🤝'}</button>
                                                        <button onClick={()=>handlePlayerAction(t,p.id,'FOUL')} className={`py-1.5 rounded font-black text-[10px] flex justify-center items-center active:scale-90 ${isUndoMode?'bg-red-900/20 text-red-500':'bg-neutral-800 text-orange-500'}`} title="Falta Individual">{isUndoMode?'-❗':'❗'}</button>
                                                        <button onClick={()=>handlePlayerAction(t,p.id,'YELLOW')} className={`py-1.5 rounded font-black text-[10px] flex justify-center items-center active:scale-90 ${isUndoMode?'bg-red-900/20 text-red-500':'bg-neutral-800 text-yellow-500'}`} title="Cartão Amarelo">{isUndoMode?'-🟨':'🟨'}</button>
                                                        <button onClick={()=>handlePlayerAction(t,p.id,'RED')} className={`py-1.5 rounded font-black text-[10px] flex justify-center items-center active:scale-90 ${isUndoMode?'bg-red-900/20 text-red-500':'bg-neutral-800 text-red-500'}`}>{isUndoMode?'-🟥':'🟥'}</button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-6 gap-1 p-2 bg-black/40 border-t border-neutral-800">
                                        <button onClick={()=>{ if(isUndoMode) { if(teams[t].corners > 0) setTeams(prev=>({...prev, [t]: {...prev[t], corners: prev[t].corners - 1}})); } else { setTeams(prev=>({...prev, [t]: {...prev[t], corners: prev[t].corners + 1}})); addEvent('ESCANTEIO', teams[t].name, 'text-neutral-400'); } }} className={`col-span-2 py-2 rounded-lg border border-neutral-800 text-[8px] font-bold uppercase active:scale-95 ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-green-400'}`}><Target size={12}/> {teams[t].corners}</button>
                                        <button onClick={()=>{ if(isUndoMode) { if(teams[t].throwIns > 0) setTeams(prev=>({...prev, [t]: {...prev[t], throwIns: prev[t].throwIns - 1}})); } else { setTeams(prev=>({...prev, [t]: {...prev[t], throwIns: prev[t].throwIns + 1}})); addEvent('LATERAL', teams[t].name, 'text-neutral-400'); } }} className={`col-span-2 py-2 rounded-lg border border-neutral-800 text-[8px] font-bold uppercase active:scale-95 ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-yellow-400'}`}><ArrowRight size={12}/> {teams[t].throwIns}</button>
                                        <button onClick={()=>{ if(isUndoMode) { if(teams[t].fouls > 0) setTeams(prev=>({...prev, [t]: {...prev[t], fouls: prev[t].fouls - 1}})); } else { setTeams(prev=>({...prev, [t]: {...prev[t], fouls: prev[t].fouls + 1}})); addEvent('FALTA', teams[t].name, 'text-orange-500'); } }} className={`col-span-2 py-2 rounded-lg border border-neutral-800 text-[8px] font-bold uppercase active:scale-95 ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-orange-500'}`}><AlertTriangle size={12}/> {teams[t].fouls}</button>
                                        <button onClick={()=>{ if(isUndoMode) { setTeams(prev=>({...prev, [t]: {...prev[t], shotsTotal: Math.max(0, prev[t].shotsTotal - 1), shotsOnTarget: Math.max(0, prev[t].shotsOnTarget - 1)}})); } else { playSfx('shot'); setTeams(prev=>({...prev, [t]: {...prev[t], shotsTotal: prev[t].shotsTotal + 1, shotsOnTarget: prev[t].shotsOnTarget + 1}})); addEvent('ALVO', teams[t].name, 'text-green-400'); } }} className={`col-span-3 py-2 rounded-lg border border-neutral-800 text-[9px] font-bold uppercase active:scale-95 ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-blue-400'}`}>{isUndoMode?'- ALVO':'ALVO'}</button>
                                        <button onClick={()=>{ if(isUndoMode) { setTeams(prev=>({...prev, [t]: {...prev[t], shotsTotal: Math.max(0, prev[t].shotsTotal - 1)}})); } else { playSfx('shot'); setTeams(prev=>({...prev, [t]: {...prev[t], shotsTotal: prev[t].shotsTotal + 1}})); addEvent('FORA', teams[t].name, 'text-neutral-500'); } }} className={`col-span-3 py-2 rounded-lg border border-neutral-800 text-[9px] font-bold uppercase active:scale-95 ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-neutral-500'}`}>{isUndoMode?'- FORA':'FORA'}</button>
                                    </div>
                                </div>
                            ))}
                            <div className="col-span-1 lg:col-span-4 bg-[#0d0d0d] border border-neutral-800 rounded-2xl flex flex-col h-[150px] md:h-auto overflow-hidden">
                                <div className="p-3 border-b border-neutral-800 text-center font-bold uppercase text-[9px] text-neutral-500">ÚLTIMOS EVENTOS</div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-1.5 no-scrollbar font-mono text-[9px]">
                                    {timeline.map((it, idx) => (
                                        <div key={idx} className="bg-black/30 p-2 rounded-lg border border-neutral-900 animate-fade flex justify-between">
                                            <span className="text-neutral-500">{it.time}</span>
                                            <span className={`${it.colorClass} font-black`}>{it.type}</span>
                                            <span className="text-neutral-400 uppercase truncate w-24 text-right">{it.description}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (appState === 'DASHBOARD') return (
                <div className="min-h-screen p-4 md:p-8 animate-fade flex flex-col">
                    {/* --- MODAL DE ESTATÍSTICAS DO JOGADOR --- */}
                    {selectedPlayerStats && (
                        <div className="fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-4 animate-fade">
                            <div className="bg-[#0d0d0d] border border-neutral-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl relative">
                                <button onClick={() => setSelectedPlayerStats(null)} className="absolute top-4 right-4 text-neutral-500 hover:text-white transition-colors"><XCircle size={24}/></button>
                                <div className="text-center mb-6 mt-2">
                                    <div className="w-16 h-16 bg-neutral-900 border border-neutral-800 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl font-black text-neutral-500">#{selectedPlayerStats.number}</div>
                                    <h3 className="text-xl font-black uppercase text-white truncate px-2">{selectedPlayerStats.name}</h3>
                                    <p className="text-[10px] text-neutral-500 font-mono mt-1 tracking-widest">ÍNDICE DE DESEMPENHO DA PARTIDA</p>
                                </div>
                                <div className="space-y-2">
                                    <PlayerBar label="Gols Marcados" value={selectedPlayerStats.goals} max={10} color="bg-emerald-500" />
                                    <PlayerBar label="Assistências" value={selectedPlayerStats.assists} max={10} color="bg-blue-500" />
                                    <PlayerBar label="Faltas Cometidas" value={selectedPlayerStats.fouls} max={10} color="bg-orange-500" />
                                    <PlayerBar label="Cartões Amarelos" value={selectedPlayerStats.yellows} max={2} color="bg-yellow-400" />
                                    <PlayerBar label="Cartões Vermelhos" value={selectedPlayerStats.reds} max={1} color="bg-red-500" />
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="max-w-3xl mx-auto space-y-6 flex-1 w-full">
                        <h1 className="text-3xl font-black text-white uppercase text-center tracking-widest">Relatório Final</h1>
                        <p className="text-[10px] text-neutral-500 font-bold uppercase tracking-widest mb-6 text-center">Toque em um jogador para ver o gráfico de desempenho</p>
                        
                        <div className="bg-[#0d0d0d] border border-neutral-800 rounded-3xl p-6 relative overflow-hidden shadow-2xl">
                            <div className="absolute top-0 left-0 w-full h-1 bg-jamaica-gradient"></div>
                            <div className="flex justify-between items-center mb-8 pb-4 border-b border-neutral-800">
                                <div className="w-1/4 flex flex-col items-center gap-2"><FlagImage code={teams.A.flag} className="w-14 h-9"/><h2 className="text-green-500 font-black uppercase text-[10px] truncate w-full text-center">{teams.A.name}</h2></div>
                                <div className="text-6xl md:text-8xl font-black text-white">{teams.A.goals}<span className="text-neutral-700 text-2xl px-2">X</span>{teams.B.goals}</div>
                                <div className="w-1/4 flex flex-col items-center gap-2"><FlagImage code={teams.B.flag} className="w-14 h-9"/><h2 className="text-yellow-400 font-black uppercase text-[10px] truncate w-full text-center">{teams.B.name}</h2></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="bg-black/40 p-4 rounded-xl border border-neutral-800 flex items-center gap-3 text-left"><Trophy size={24} className="text-yellow-500"/><div><p className="text-[8px] text-neutral-500 uppercase font-black">CRAQUE</p><p className="text-sm font-black text-white uppercase truncate">{motm?.name || '---'}</p></div></div>
                                <div className="bg-black/40 p-4 rounded-xl border border-neutral-800 flex items-center gap-3 text-left"><Target size={24} className="text-green-500"/><div><p className="text-[8px] text-neutral-500 uppercase font-black">ARTILHEIRO</p><p className="text-sm font-black text-white uppercase truncate">{teams.A.players.concat(teams.B.players).sort((a,b)=>b.goals-a.goals)[0]?.name || '---'}</p></div></div>
                            </div>
                            <div className="space-y-1">
                                <StatBar label="GOLS" valA={teams.A.goals} valB={teams.B.goals} />
                                <StatBar label="ASSISTÊNCIAS" valA={teams.A.players.reduce((a,b)=>a+(b.assists||0),0)} valB={teams.B.players.reduce((a,b)=>a+(b.assists||0),0)} />
                                <StatBar label="FINALIZAÇÕES" valA={teams.A.shotsTotal} valB={teams.B.shotsTotal} />
                                <StatBar label="CHUTES AO ALVO" valA={teams.A.shotsOnTarget} valB={teams.B.shotsOnTarget} />
                                <StatBar label="ESCANTEIOS" valA={teams.A.corners} valB={teams.B.corners} />
                                <StatBar label="LATERAIS" valA={teams.A.throwIns} valB={teams.B.throwIns} />
                                <StatBar label="FALTAS COLETIVAS" valA={teams.A.fouls} valB={teams.B.fouls} />
                                <StatBar label="AMARELOS" valA={teams.A.players.reduce((a,b)=>a+(b.yellows||0),0)} valB={teams.B.players.reduce((a,b)=>a+(b.yellows||0),0)} />
                                <StatBar label="VERMELHOS" valA={teams.A.players.reduce((a,b)=>a+(b.reds||0),0)} valB={teams.B.players.reduce((a,b)=>a+(b.reds||0),0)} />
                            </div>

                            <div className="h-48 overflow-y-auto no-scrollbar border-t border-neutral-800 pt-4 font-mono text-[10px] space-y-2 mt-6">
                                <p className="text-neutral-500 font-black border-b border-neutral-900 pb-1 uppercase">Elenco e Desempenho</p>
                                <div className="grid grid-cols-2 gap-8">
                                    <div className="space-y-1">
                                        {teams.A.players.map(p=>(
                                            <div key={p.id} onClick={() => setSelectedPlayerStats(p)} className="flex justify-between text-green-500/80 cursor-pointer hover:bg-neutral-900 p-1.5 rounded transition-colors group">
                                                <span>#{p.number} {p.name} <Activity size={10} className="inline ml-1 opacity-0 group-hover:opacity-100 transition-opacity text-white"/></span>
                                                <span>⚽{p.goals} 🤝{p.assists||0} ❗{p.fouls||0}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="space-y-1">
                                        {teams.B.players.map(p=>(
                                            <div key={p.id} onClick={() => setSelectedPlayerStats(p)} className="flex justify-between text-yellow-500/80 cursor-pointer hover:bg-neutral-900 p-1.5 rounded transition-colors group">
                                                <span>#{p.number} {p.name} <Activity size={10} className="inline ml-1 opacity-0 group-hover:opacity-100 transition-opacity text-white"/></span>
                                                <span>⚽{p.goals} 🤝{p.assists||0} ❗{p.fouls||0}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                            <button onClick={()=>setAppState('SETUP')} className="flex-1 py-4 bg-neutral-900 border border-neutral-800 rounded-2xl text-white font-black uppercase text-sm active:scale-95">DESCARTAR</button>
                            <button onClick={saveMatch} disabled={isSaving} className="flex-1 py-4 bg-gradient-to-r from-green-600 to-green-500 text-white font-black rounded-2xl uppercase text-sm shadow-xl active:scale-95 disabled:opacity-50">{isSaving?'SALVANDO...':'SALVAR PARTIDA'}</button>
                        </div>
                    </div>
                    <FooterCredits />
                </div>
            );

            if (appState === 'HISTORY') return (
                <div className="min-h-screen p-4 md:p-8 animate-fade flex flex-col">
                    {/* --- MODAL DE ESTATÍSTICAS DO JOGADOR --- */}
                    {selectedPlayerStats && (
                        <div className="fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-4 animate-fade">
                            <div className="bg-[#0d0d0d] border border-neutral-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl relative">
                                <button onClick={() => setSelectedPlayerStats(null)} className="absolute top-4 right-4 text-neutral-500 hover:text-white transition-colors"><XCircle size={24}/></button>
                                <div className="text-center mb-6 mt-2">
                                    <div className="w-16 h-16 bg-neutral-900 border border-neutral-800 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl font-black text-neutral-500">#{selectedPlayerStats.number}</div>
                                    <h3 className="text-xl font-black uppercase text-white truncate px-2">{selectedPlayerStats.name}</h3>
                                    <p className="text-[10px] text-neutral-500 font-mono mt-1 tracking-widest">ÍNDICE DE DESEMPENHO DA PARTIDA</p>
                                </div>
                                <div className="space-y-2">
                                    <PlayerBar label="Gols Marcados" value={selectedPlayerStats.goals} max={10} color="bg-emerald-500" />
                                    <PlayerBar label="Assistências" value={selectedPlayerStats.assists} max={10} color="bg-blue-500" />
                                    <PlayerBar label="Faltas Cometidas" value={selectedPlayerStats.fouls} max={10} color="bg-orange-500" />
                                    <PlayerBar label="Cartões Amarelos" value={selectedPlayerStats.yellows} max={2} color="bg-yellow-400" />
                                    <PlayerBar label="Cartões Vermelhos" value={selectedPlayerStats.reds} max={1} color="bg-red-500" />
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="max-w-4xl mx-auto space-y-6 flex-1 w-full">
                        <div className="flex flex-col md:flex-row justify-between items-center border-b border-neutral-800 pb-4 gap-4">
                            <div className="flex items-center gap-3">
                                <HistoryIcon size={32} className="text-green-500"/>
                                <h1 className="text-2xl md:text-3xl font-black text-white uppercase tracking-widest">HISTÓRICO GERAL</h1>
                            </div>
                            <div className="flex gap-2 w-full md:w-auto">
                                {!selectedMatch && (
                                    <div className="flex bg-[#111] p-1 rounded-xl border border-neutral-800 flex-1 md:flex-none">
                                        <button onClick={()=>setHistoryTab('GAMES')} className={`flex-1 px-4 py-2 rounded-lg text-[10px] font-black transition-all ${historyTab==='GAMES'?'bg-neutral-800 text-white':'text-neutral-500'}`}>PARTIDAS</button>
                                        <button onClick={()=>setHistoryTab('TABLE')} className={`flex-1 px-4 py-2 rounded-lg text-[10px] font-black transition-all ${historyTab==='TABLE'?'bg-neutral-800 text-white':'text-neutral-500'}`}>CLASSIFICAÇÃO GERAL</button>
                                    </div>
                                )}
                                <button onClick={()=>setAppState('SETUP')} className="p-3 bg-neutral-900 border border-neutral-800 rounded-xl active:scale-90"><ArrowLeft size={20}/></button>
                            </div>
                        </div>

                        {selectedMatch ? (
                            <div className="bg-[#0d0d0d] p-6 rounded-3xl border border-neutral-800 animate-fade relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-jamaica-gradient"></div>
                                <div className="flex justify-between items-center mb-8 mt-2">
                                    <div className="flex flex-col items-center gap-2"><FlagImage code={selectedMatch.teamA.flag} className="w-16 h-11"/><p className="text-green-500 font-black text-xs uppercase">{selectedMatch.teamA.name}</p></div>
                                    <div className="text-5xl font-black text-white">{selectedMatch.teamA.goals} : {selectedMatch.teamB.goals}</div>
                                    <div className="flex flex-col items-center gap-2"><FlagImage code={selectedMatch.teamB.flag} className="w-16 h-11"/><p className="text-yellow-400 font-black text-xs uppercase">{selectedMatch.teamB.name}</p></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4 mb-8">
                                    <StatBar label="GOLS" valA={selectedMatch.teamA.goals} valB={selectedMatch.teamB.goals} />
                                    <StatBar label="FALTAS COLETIVAS" valA={selectedMatch.teamA.fouls} valB={selectedMatch.teamB.fouls} />
                                    <StatBar label="ESCANTEIOS" valA={selectedMatch.teamA.corners} valB={selectedMatch.teamB.corners} />
                                    <StatBar label="CHUTES" valA={selectedMatch.teamA.shotsTotal || 0} valB={selectedMatch.teamB.shotsTotal || 0} />
                                </div>
                                <div className="h-48 overflow-y-auto no-scrollbar border-t border-neutral-800 pt-4 font-mono text-[10px] space-y-2">
                                    <p className="text-neutral-500 font-black border-b border-neutral-900 pb-1 uppercase">Elenco e Desempenho (Clique para Ver Gráficos)</p>
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="space-y-1">
                                            {selectedMatch.teamA.players.map(p=>(
                                                <div key={p.id} onClick={() => setSelectedPlayerStats(p)} className="flex justify-between text-green-500/80 cursor-pointer hover:bg-neutral-900 p-1.5 rounded transition-colors group">
                                                    <span>#{p.number} {p.name} <Activity size={10} className="inline ml-1 opacity-0 group-hover:opacity-100 transition-opacity text-white"/></span>
                                                    <span>⚽{p.goals} 🤝{p.assists||0} ❗{p.fouls||0}</span>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="space-y-1">
                                            {selectedMatch.teamB.players.map(p=>(
                                                <div key={p.id} onClick={() => setSelectedPlayerStats(p)} className="flex justify-between text-yellow-500/80 cursor-pointer hover:bg-neutral-900 p-1.5 rounded transition-colors group">
                                                    <span>#{p.number} {p.name} <Activity size={10} className="inline ml-1 opacity-0 group-hover:opacity-100 transition-opacity text-white"/></span>
                                                    <span>⚽{p.goals} 🤝{p.assists||0} ❗{p.fouls||0}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <button onClick={()=>setSelectedMatch(null)} className="mt-6 w-full py-4 bg-neutral-900 border border-neutral-800 rounded-2xl font-black uppercase text-sm">FECHAR SÚMULA</button>
                            </div>
                        ) : historyTab === 'TABLE' ? (
                            <div className="bg-[#0d0d0d] border border-neutral-800 rounded-2xl overflow-hidden shadow-xl animate-fade">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm text-slate-300">
                                        <thead className="bg-neutral-900/80 text-[10px] uppercase font-black text-neutral-500">
                                            <tr>
                                                <th className="px-4 py-4 text-center">Pos</th>
                                                <th className="px-4 py-4">Time</th>
                                                <th className="px-3 py-4 text-center">Pts</th>
                                                <th className="px-3 py-4 text-center">P</th>
                                                <th className="px-3 py-4 text-center">V</th>
                                                <th className="px-3 py-4 text-center">E</th>
                                                <th className="px-3 py-4 text-center">D</th>
                                                <th className="px-3 py-4 text-center">GP</th>
                                                <th className="px-3 py-4 text-center">GC</th>
                                                <th className="px-3 py-4 text-center">SG</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-neutral-800/50">
                                            {getStandings().map((team, idx) => (
                                                <tr key={idx} className="hover:bg-neutral-800/30 transition-colors">
                                                    <td className="px-4 py-3 text-center font-bold text-neutral-500">{idx + 1}º</td>
                                                    <td className="px-4 py-3 font-bold text-white flex items-center gap-2">
                                                        <FlagImage code={team.flag} className="w-6 h-4" />
                                                        <span className="truncate max-w-[100px] md:max-w-[200px]">{team.name}</span>
                                                    </td>
                                                    <td className="px-3 py-3 text-center font-black text-green-500">{team.pts}</td>
                                                    <td className="px-3 py-3 text-center font-mono">{team.p}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.v}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.e}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.d}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.gp}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.gc}</td>
                                                    <td className="px-3 py-3 text-center font-mono font-bold text-white">{team.gp - team.gc}</td>
                                                </tr>
                                            ))}
                                            {getStandings().length === 0 && (
                                                <tr><td colSpan="10" className="px-4 py-10 text-center font-mono italic text-neutral-600">Nenhum dado para a classificação.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fade">
                                {matchHistory.map(m=>(
                                    <div key={m.id} onClick={()=>setSelectedMatch(m)} className="bg-[#0d0d0d] p-5 rounded-2xl border border-neutral-800 flex justify-between items-center hover:border-green-500 transition-all cursor-pointer group shadow-xl">
                                        <div className="flex flex-col"><span className="text-[10px] text-neutral-600 font-mono mb-1">{m.dateString}</span><div className="flex items-center gap-2 text-green-500 font-black text-sm uppercase"><FlagImage code={m.teamA.flag} className="w-8 h-5"/> <span className="truncate w-20 md:w-full">{m.teamA.name}</span></div></div>
                                        <div className="text-3xl font-black text-white">{m.teamA.goals} - {m.teamB.goals}</div>
                                        <div className="flex flex-col items-end"><div className="flex items-center gap-2 text-yellow-400 font-black text-sm uppercase"><span className="truncate w-20 md:w-full text-right">{m.teamB.name}</span> <FlagImage code={m.teamB.flag} className="w-8 h-5"/></div></div>
                                        <button onClick={(e)=>{ e.stopPropagation(); if(confirm("Apagar súmula permanentemente?")) deleteDoc(doc(db, 'artifacts', appRootId, 'users', user.uid, 'matches', m.id)); }} className="ml-4 p-3 text-neutral-700 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-all hidden md:block"><Trash2 size={20}/></button>
                                    </div>
                                ))}
                                {matchHistory.length === 0 && <div className="text-center py-20 bg-[#0d0d0d] rounded-3xl border border-neutral-900 text-neutral-600 font-mono italic">Nenhum registro no banco de dados.</div>}
                            </div>
                        )}
                    </div>
                    <FooterCredits />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
