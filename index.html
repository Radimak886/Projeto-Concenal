<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAD CBF</title>
    
    <!-- Bibliotecas Base -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #050505; color: #e5e5e5; font-family: sans-serif; overflow-x: hidden; }
        
        /* Animações Maker */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        .animate-fade { animation: fadeInUp 0.3s ease-out forwards; }
        .animate-pop { animation: pop 0.2s ease-out; }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
        .undo-active { animation: pulseRed 1.5s infinite; border-color: #ef4444 !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .bg-jamaica-gradient { background: linear-gradient(to right, #22c55e, #eab308, #000); }
        .modal-overlay { background-color: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        
        // --- ÍCONES PHOSPHOR ---
        const Play = ({size, className}) => <i className={`ph-fill ph-play ${className||''}`} style={{fontSize: size}}></i>;
        const Square = ({size, className}) => <i className={`ph-fill ph-square ${className||''}`} style={{fontSize: size}}></i>;
        const Trophy = ({size, className}) => <i className={`ph-fill ph-trophy ${className||''}`} style={{fontSize: size}}></i>;
        const Shield = ({size, className}) => <i className={`ph-fill ph-shield-check ${className||''}`} style={{fontSize: size}}></i>;
        const Target = ({size, className}) => <i className={`ph-fill ph-target ${className||''}`} style={{fontSize: size}}></i>;
        const AlertTriangle = ({size, className}) => <i className={`ph-fill ph-warning ${className||''}`} style={{fontSize: size}}></i>;
        const Clock = ({size, className}) => <i className={`ph-fill ph-clock ${className||''}`} style={{fontSize: size}}></i>;
        const Zap = ({size, className}) => <i className={`ph-fill ph-lightning ${className||''}`} style={{fontSize: size}}></i>;
        const Activity = ({size, className}) => <i className={`ph-fill ph-activity ${className||''}`} style={{fontSize: size}}></i>;
        const Award = ({size, className}) => <i className={`ph-fill ph-medal ${className||''}`} style={{fontSize: size}}></i>;
        const UserPlus = ({size, className}) => <i className={`ph-fill ph-user-plus ${className||''}`} style={{fontSize: size}}></i>;
        const ListPlus = ({size, className}) => <i className={`ph-fill ph-list-plus ${className||''}`} style={{fontSize: size}}></i>;
        const ArrowRight = ({size, className}) => <i className={`ph-bold ph-arrow-right ${className||''}`} style={{fontSize: size}}></i>;
        const Trash2 = ({size, className}) => <i className={`ph-fill ph-trash ${className||''}`} style={{fontSize: size}}></i>;
        const Pause = ({size, className}) => <i className={`ph-fill ph-pause ${className||''}`} style={{fontSize: size}}></i>;
        const FastForward = ({size, className}) => <i className={`ph-fill ph-fast-forward ${className||''}`} style={{fontSize: size}}></i>;
        const Flag = ({size, className}) => <i className={`ph-fill ph-flag ${className||''}`} style={{fontSize: size}}></i>;
        const Database = ({size, className}) => <i className={`ph-fill ph-database ${className||''}`} style={{fontSize: size}}></i>;
        const HistoryIcon = ({size, className}) => <i className={`ph-bold ph-clock-counter-clockwise ${className||''}`} style={{fontSize: size}}></i>;
        const ArrowLeft = ({size, className}) => <i className={`ph-bold ph-arrow-left ${className||''}`} style={{fontSize: size}}></i>;
        const Crosshair = ({size, className}) => <i className={`ph-bold ph-crosshair ${className||''}`} style={{fontSize: size}}></i>;
        const Wind = ({size, className}) => <i className={`ph-bold ph-wind ${className||''}`} style={{fontSize: size}}></i>;
        const FileText = ({size, className}) => <i className={`ph-fill ph-file-text ${className||''}`} style={{fontSize: size}}></i>;
        const Plus = ({size, className}) => <i className={`ph-bold ph-plus ${className||''}`} style={{fontSize: size}}></i>;
        const Handshake = ({size, className}) => <i className={`ph-fill ph-handshake ${className||''}`} style={{fontSize: size}}></i>;
        const Eraser = ({size, className}) => <i className={`ph-fill ph-eraser ${className||''}`} style={{fontSize: size}}></i>;
        const XCircle = ({size, className}) => <i className={`ph-fill ph-x-circle ${className||''}`} style={{fontSize: size}}></i>;
        const Star = ({size, className}) => <i className={`ph-fill ph-star ${className||''}`} style={{fontSize: size}}></i>;
        const ArrowsClockwise = ({size, className}) => <i className={`ph-bold ph-arrows-clockwise ${className||''}`} style={{fontSize: size}}></i>;

        // --- CONFIGURAÇÃO FIREBASE (Credenciais do Kelvin) ---
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBwgLd5qV_cClw7VGKUq3j5rdzRzNoc_68",
            authDomain: "arbitragem-8f746.firebaseapp.com",
            projectId: "arbitragem-8f746",
            storageBucket: "arbitragem-8f746.firebasestorage.app",
            messagingSenderId: "816911924211",
            appId: "1:816911924211:web:1fb487f5d13b75ad30b086",
            measurementId: "G-LM7BLGMHQL"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appRootId = "arbitragem-kelvin-final"; 

        // --- SISTEMA DE ÁUDIO MAKER ---
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playSfx = (type) => {
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const playNote = (freq, start, duration, wave='square') => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = wave;
                    osc.frequency.setValueAtTime(freq, start);
                    gain.gain.setValueAtTime(0.08, start);
                    gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(start);
                    osc.stop(start + duration);
                };
                if (type === 'start') playNote(1000, now, 0.4);
                else if (type === 'end') { playNote(1000, now, 0.3); playNote(1000, now+0.4, 0.3); playNote(1000, now+0.8, 1.0); }
                else if (type === 'goal') { playNote(523, now, 0.15, 'triangle'); playNote(659, now+0.1, 0.15, 'triangle'); playNote(784, now+0.2, 0.4, 'triangle'); }
                else if (type === 'assist') { playNote(1200, now, 0.1, 'sine'); playNote(1600, now+0.05, 0.2, 'sine'); }
                else if (type === 'shot') { playNote(800, now, 0.05); playNote(400, now+0.05, 0.1); }
            } catch (e) {}
        };

        // --- BANDEIRAS ---
        const COUNTRY_FLAGS = [
            { code: 'br', name: 'Brasil' }, { code: 'jm', name: 'Jamaica' },
            { code: 'ar', name: 'Argentina' }, { code: 'uy', name: 'Uruguai' },
            { code: 'co', name: 'Colômbia' }, { code: 'cl', name: 'Chile' },
            { code: 'pe', name: 'Peru' }, { code: 'us', name: 'EUA' },
            { code: 'mx', name: 'México' }, { code: 'ca', name: 'Canadá' },
            { code: 'gb-eng', name: 'Inglaterra' }, { code: 'es', name: 'Espanha' },
            { code: 'fr', name: 'França' }, { code: 'de', name: 'Alemanha' },
            { code: 'it', name: 'Itália' }, { code: 'pt', name: 'Portugal' }
        ];

        const FlagImage = ({ code, className }) => {
            if (!code) return <div className={`bg-neutral-800 flex items-center justify-center rounded ${className}`}><i className="ph ph-flag text-neutral-600"></i></div>;
            return <img src={`https://flagcdn.com/${code}.svg`} className={`object-cover rounded shadow-sm border border-neutral-800 ${className}`} />;
        };

        // --- COMPONENTE GRÁFICO CORRIGIDO (Zero Neutro) ---
        const StatBar = ({ label, valA, valB }) => {
            const numA = valA || 0;
            const numB = valB || 0;
            const total = numA + numB;
            
            // Se ambos forem zero, a barra fica 50/50 com cor cinza neutra
            const isZeroZero = total === 0;
            const pctA = isZeroZero ? 50 : (numA / total) * 100;
            
            const colorClassA = isZeroZero ? 'bg-neutral-800' : 'bg-green-500';
            const colorClassB = isZeroZero ? 'bg-neutral-800' : 'bg-yellow-400';
            const textClassA = isZeroZero ? 'text-neutral-600' : 'text-green-500';
            const textClassB = isZeroZero ? 'text-neutral-600' : 'text-yellow-400';

            return (
                <div className="mb-3 w-full">
                    <div className="flex justify-between items-center text-[10px] font-bold text-neutral-300 mb-1 uppercase tracking-tighter px-1">
                        <span className={`w-8 font-mono text-base ${textClassA}`}>{numA}</span>
                        <span className="flex-1 text-center">{label}</span>
                        <span className={`w-8 text-right font-mono text-base ${textClassB}`}>{numB}</span>
                    </div>
                    <div className="h-1.5 w-full bg-[#111] rounded-full flex overflow-hidden border border-neutral-900">
                        <div style={{ width: `${pctA}%` }} className={`h-full transition-all duration-700 ${colorClassA}`}></div>
                        <div style={{ width: `${100 - pctA}%` }} className={`h-full transition-all duration-700 ${colorClassB}`}></div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [matchHistory, setMatchHistory] = useState([]);
            const [selectedMatch, setSelectedMatch] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [appState, setAppState] = useState('SETUP'); 
            const [time, setTime] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [period, setPeriod] = useState('1º Tempo');
            const [timeline, setTimeline] = useState([]);
            const [isUndoMode, setIsUndoMode] = useState(false);
            const [matchConfig, setMatchConfig] = useState({ durationMinutes: 10, goalLimit: 3 });
            const [showBulkAdd, setShowBulkAdd] = useState(null);
            const [bulkInput, setBulkInput] = useState("");
            
            // Estado para alternar entre "Partidas" e "Classificação" na tela de histórico
            const [historyTab, setHistoryTab] = useState('GAMES'); // 'GAMES' | 'TABLE'

            const getInitialTeams = () => ({
                A: { name: '', flag: null, color: 'green', goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: [] },
                B: { name: '', flag: null, color: 'yellow', goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: [] }
            });

            const [teams, setTeams] = useState(getInitialTeams());
            const [motm, setMotm] = useState(null);
            const [newPlayer, setNewPlayer] = useState({ A: { name: '', number: '', hist: '' }, B: { name: '', number: '', hist: '' } });
            const [activeFlagPicker, setActiveFlagPicker] = useState(null);
            const [animatingPlayer, setAnimatingPlayer] = useState(null);

            // AUTENTICAÇÃO
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && firebaseConfig.projectId !== "arbitragem-8f746") {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        try { await signInAnonymously(auth); } catch (err) {}
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // ESCUTA DO BANCO DE DADOS
            useEffect(() => {
                if (!user) return;
                const ref = collection(db, 'artifacts', appRootId, 'users', user.uid, 'matches');
                const unsubscribe = onSnapshot(ref, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMatchHistory(data.sort((a,b) => b.timestamp - a.timestamp));
                }, (error) => {});
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                let interval;
                if (isTimerRunning && appState === 'MATCH') {
                    interval = setInterval(() => {
                        setTime(t => {
                            if (t <= 1) { playSfx('end'); setIsTimerRunning(false); return 0; }
                            return t - 1;
                        });
                    }, 1000);
                } else clearInterval(interval);
                return () => clearInterval(interval);
            }, [isTimerRunning, appState]);

            const formatTime = (seconds) => `${Math.floor(seconds / 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;
            
            const addEvent = (type, desc, color) => {
                setTimeline(p => [{ time: `${period} - ${Math.floor(time/60)}'`, type, description: desc, colorClass: color }, ...p]);
            };

            // ZERAR / REINICIAR PARTIDA
            const handleResetMatch = () => {
                if(confirm("Deseja ZERAR a partida? O tempo e o placar voltarão ao início, mas os times escalados serão mantidos.")) {
                    setIsTimerRunning(false);
                    setTime(matchConfig.durationMinutes * 60);
                    setTimeline([]);
                    setTeams(prev => {
                        const resetPlayers = (players) => players.map(p => ({...p, goals: 0, assists: 0, yellows: 0, reds: 0}));
                        return {
                            A: { ...prev.A, goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: resetPlayers(prev.A.players) },
                            B: { ...prev.B, goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: resetPlayers(prev.B.players) }
                        };
                    });
                    setMotm(null);
                    setIsUndoMode(false);
                }
            };

            const handlePlayerAction = (teamId, playerId, action) => {
                const team = teams[teamId];
                const player = team.players.find(p => p.id === playerId);
                if (!player) return;

                let up = { ...player };
                let ut = { ...team };
                setAnimatingPlayer(playerId);
                setTimeout(() => setAnimatingPlayer(null), 300);

                if (isUndoMode) {
                    if (action === 'GOAL' && up.goals > 0) { up.goals--; ut.goals--; ut.shotsTotal--; ut.shotsOnTarget--; addEvent('ANULADO', `Gol de ${up.name} removido`, 'text-red-400'); }
                    else if (action === 'ASSIST' && up.assists > 0) { up.assists--; addEvent('CORREÇÃO', `Assist. de ${up.name} removida`, 'text-neutral-500'); }
                    else if (action === 'YELLOW' && up.yellows > 0) { up.yellows--; if(up.yellows < 2) up.reds = 0; addEvent('CORREÇÃO', `Amarelo de ${up.name} removido`, 'text-neutral-500'); }
                    else if (action === 'RED' && up.reds > 0) { up.reds = 0; addEvent('CORREÇÃO', `Vermelho de ${up.name} removido`, 'text-neutral-500'); }
                } else {
                    if (action === 'GOAL') {
                        up.goals++; ut.goals++; ut.shotsTotal++; ut.shotsOnTarget++; playSfx('goal');
                        addEvent('GOL', `${up.name} (${ut.name})`, 'text-green-400 font-bold');
                        if (matchConfig.goalLimit > 0 && ut.goals >= matchConfig.goalLimit) {
                            setTeams(p => ({ ...p, [teamId]: { ...ut, players: ut.players.map(pl => pl.id === playerId ? up : pl) } }));
                            playSfx('end'); setIsTimerRunning(false); setTimeout(() => setAppState('DASHBOARD'), 1000); return;
                        }
                    } else if (action === 'ASSIST') {
                        up.assists = (up.assists || 0) + 1; playSfx('assist'); addEvent('ASSIST.', `${up.name}`, 'text-blue-400');
                    } else if (action === 'YELLOW') {
                        if (up.reds > 0) return; up.yellows++; addEvent('AMARELO', up.name, 'text-yellow-400');
                        if (up.yellows === 2) { up.reds = 1; addEvent('EXPULSÃO', `${up.name} (2º Amarelo)`, 'text-red-500 font-bold'); }
                    } else if (action === 'RED') {
                        if (up.reds > 0) return; up.reds = 1; addEvent('VERMELHO', `${up.name} expulso`, 'text-red-500 font-bold');
                    }
                }
                setTeams(p => ({ ...p, [teamId]: { ...ut, players: ut.players.map(pl => pl.id === playerId ? up : pl) } }));
            };

            const handleTeamAction = (teamId, action) => {
                if (isUndoMode) {
                    if (teams[teamId][action] > 0) setTeams(p => ({ ...p, [teamId]: { ...p[teamId], [action]: p[teamId][action] - 1 } }));
                } else {
                    setTeams(p => ({ ...p, [teamId]: { ...p[teamId], [action]: p[teamId][action] + 1 } }));
                    const lbls = { corners: 'Escanteio', throwIns: 'Lateral', fouls: 'Falta' };
                    addEvent(lbls[action].toUpperCase(), teams[teamId].name, 'text-neutral-400');
                }
            };

            const handleShot = (teamId, isOnTarget) => {
                if (isUndoMode) {
                    setTeams(p => ({ ...p, [teamId]: { ...p[teamId], shotsTotal: Math.max(0, p[teamId].shotsTotal - 1), shotsOnTarget: isOnTarget ? Math.max(0, p[teamId].shotsOnTarget - 1) : p[teamId].shotsOnTarget } }));
                } else {
                    playSfx('shot');
                    setTeams(p => ({ ...p, [teamId]: { ...p[teamId], shotsTotal: p[teamId].shotsTotal + 1, shotsOnTarget: isOnTarget ? p[teamId].shotsOnTarget + 1 : p[teamId].shotsOnTarget } }));
                    addEvent(isOnTarget ? 'ALVO' : 'FORA', `Chute: ${teams[teamId].name}`, isOnTarget ? 'text-green-400' : 'text-neutral-500');
                }
            };

            const processBulkAdd = (teamId) => {
                const lines = bulkInput.split('\n').filter(l => l.trim() !== "");
                const newPlayersList = [];
                let currentMaxNumber = teams[teamId].players.reduce((max, p) => Math.max(max, p.number || 0), 0);
                lines.forEach(line => {
                    const match = line.match(/^(\d+)[- ]*(.+)$/);
                    let num, name;
                    if (match) { num = parseInt(match[1]); name = match[2].trim().toUpperCase(); } 
                    else { currentMaxNumber++; num = currentMaxNumber; name = line.trim().toUpperCase(); }
                    newPlayersList.push({ id: Math.random().toString(36).substr(2, 9), name, number: num, goals: 0, assists: 0, yellows: 0, reds: 0, historicYellows: 0 });
                });
                setTeams(p => ({ ...p, [teamId]: { ...p[teamId], players: [...p[teamId].players, ...newPlayersList] } }));
                setBulkInput(""); setShowBulkAdd(null);
            };

            const saveMatch = async () => {
                if(!user) return;
                setIsSaving(true);
                try {
                    const allP = [...teams.A.players, ...teams.B.players];
                    const scorer = allP.reduce((m, p) => (p.goals > (m?.goals || 0) ? p : m), null);
                    const data = { 
                        timestamp: Date.now(), 
                        dateString: new Date().toLocaleString('pt-BR'), 
                        teamA: teams.A, 
                        teamB: teams.B, 
                        timeline, 
                        highlights: { motm: motm?.name || '---', topScorer: scorer?.goals > 0 ? scorer.name : '---' } 
                    };
                    await addDoc(collection(db, 'artifacts', appRootId, 'users', user.uid, 'matches'), data);
                    setTeams(getInitialTeams()); setTimeline([]); setAppState('HISTORY');
                } catch(e){} finally { setIsSaving(false); }
            };

            // Lógica para Tabela de Classificação
            const getStandings = () => {
                const table = {};
                matchHistory.forEach(m => {
                    const tA = m.teamA.name.toUpperCase().trim();
                    const tB = m.teamB.name.toUpperCase().trim();
                    
                    if(!table[tA]) table[tA] = { name: m.teamA.name, flag: m.teamA.flag, p:0, v:0, e:0, d:0, gp:0, gc:0, pts:0 };
                    if(!table[tB]) table[tB] = { name: m.teamB.name, flag: m.teamB.flag, p:0, v:0, e:0, d:0, gp:0, gc:0, pts:0 };
                    
                    table[tA].p++; table[tB].p++;
                    table[tA].gp += m.teamA.goals; table[tA].gc += m.teamB.goals;
                    table[tB].gp += m.teamB.goals; table[tB].gc += m.teamA.goals;
                    
                    if(m.teamA.goals > m.teamB.goals) {
                        table[tA].v++; table[tA].pts += 3;
                        table[tB].d++;
                    } else if(m.teamB.goals > m.teamA.goals) {
                        table[tB].v++; table[tB].pts += 3;
                        table[tA].d++;
                    } else {
                        table[tA].e++; table[tA].pts += 1;
                        table[tB].e++; table[tB].pts += 1;
                    }
                });
                
                return Object.values(table).sort((a,b) => {
                    if(b.pts !== a.pts) return b.pts - a.pts; // Pontos
                    if(b.v !== a.v) return b.v - a.v; // Vitórias
                    const sgA = a.gp - a.gc; const sgB = b.gp - b.gc;
                    if(sgB !== sgA) return sgB - sgA; // Saldo de Gols
                    return b.gp - a.gp; // Gols Pró
                });
            };

            // --- UI RENDER ---
            if (appState === 'SETUP') return (
                <div className="min-h-screen p-2 md:p-6 animate-fade">
                    <div className="max-w-5xl mx-auto space-y-4">
                        {showBulkAdd && (
                            <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
                                <div className="bg-[#0d0d0d] border border-neutral-800 w-full max-w-lg rounded-2xl p-6 shadow-2xl animate-fade">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-black uppercase text-white flex items-center gap-2"><ListPlus size={20} className="text-blue-500" /> Lista de Jogadores - Time {showBulkAdd}</h3>
                                        <button onClick={()=>setShowBulkAdd(null)} className="text-neutral-500 hover:text-white transition-colors"><XCircle size={24}/></button>

                                </div>

                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="bg-black/40 p-4 rounded-xl border border-neutral-800 flex items-center gap-3 text-left"><Trophy size={24} className="text-yellow-500"/><div><p className="text-[8px] text-neutral-500 uppercase font-black">CRAQUE</p><p className="text-sm font-black text-white uppercase truncate">{motm?.name || '---'}</p></div></div>
                                <div className="bg-black/40 p-4 rounded-xl border border-neutral-800 flex items-center gap-3 text-left"><Target size={24} className="text-green-500"/><div><p className="text-[8px] text-neutral-500 uppercase font-black">ARTILHEIRO</p><p className="text-sm font-black text-white uppercase truncate">{teams.A.players.concat(teams.B.players).sort((a,b)=>b.goals-a.goals)[0]?.name || '---'}</p></div></div>
                            </div>
                            <div className="space-y-1">
                                <StatBar label="GOLS" valA={teams.A.goals} valB={teams.B.goals} />
                                <StatBar label="ASSISTÊNCIAS" valA={teams.A.players.reduce((a,b)=>a+(b.assists||0),0)} valB={teams.B.players.reduce((a,b)=>a+(b.assists||0),0)} />
                                <StatBar label="FINALIZAÇÕES" valA={teams.A.shotsTotal} valB={teams.B.shotsTotal} />
                                <StatBar label="CHUTES AO ALVO" valA={teams.A.shotsOnTarget} valB={teams.B.shotsOnTarget} />
                                <StatBar label="ESCANTEIOS" valA={teams.A.corners} valB={teams.B.corners} />
                                <StatBar label="LATERAIS" valA={teams.A.throwIns} valB={teams.B.throwIns} />
                                <StatBar label="FALTAS" valA={teams.A.fouls} valB={teams.B.fouls} />
                                <StatBar label="AMARELOS" valA={teams.A.players.reduce((a,b)=>a+b.yellows,0)} valB={teams.B.players.reduce((a,b)=>a+b.yellows,0)} />
                                <StatBar label="VERMELHOS" valA={teams.A.players.reduce((a,b)=>a+b.reds,0)} valB={teams.B.players.reduce((a,b)=>a+b.reds,0)} />
                            </div>
                        </div>
                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                            <button onClick={()=>setAppState('SETUP')} className="flex-1 py-4 bg-neutral-900 border border-neutral-800 rounded-2xl text-white font-black uppercase text-sm active:scale-95">DESCARTAR</button>
                            <button onClick={saveMatch} disabled={isSaving} className="flex-1 py-4 bg-gradient-to-r from-green-600 to-green-500 text-white font-black rounded-2xl uppercase text-sm shadow-xl active:scale-95 disabled:opacity-50">{isSaving?'SALVANDO...':'SALVAR PARTIDA'}</button>
                        </div>
                    </div>
                </div>
            );

            if (appState === 'HISTORY') return (
                <div className="min-h-screen p-4 md:p-8 animate-fade">
                    <div className="max-w-4xl mx-auto space-y-6">
                        <div className="flex flex-col md:flex-row justify-between items-center border-b border-neutral-800 pb-4 gap-4">
                            <div className="flex items-center gap-3">
                                <HistoryIcon size={32} className="text-green-500"/>
                                <h1 className="text-2xl md:text-3xl font-black text-white uppercase tracking-widest">ARQUIVO DIGITAL</h1>
                            </div>
                            <div className="flex gap-2 w-full md:w-auto">
                                {!selectedMatch && (
                                    <div className="flex bg-[#111] p-1 rounded-xl border border-neutral-800 flex-1 md:flex-none">
                                        <button onClick={()=>setHistoryTab('GAMES')} className={`flex-1 px-4 py-2 rounded-lg text-[10px] font-black transition-all ${historyTab==='GAMES'?'bg-neutral-800 text-white':'text-neutral-500'}`}>PARTIDAS</button>
                                        <button onClick={()=>setHistoryTab('TABLE')} className={`flex-1 px-4 py-2 rounded-lg text-[10px] font-black transition-all ${historyTab==='TABLE'?'bg-neutral-800 text-white':'text-neutral-500'}`}>CLASSIFICAÇÃO</button>
                                    </div>
                                )}
                                <button onClick={()=>setAppState('SETUP')} className="p-3 bg-neutral-900 border border-neutral-800 rounded-xl active:scale-90"><ArrowLeft size={20}/></button>
                            </div>
                        </div>

                        {selectedMatch ? (
                            <div className="bg-[#0d0d0d] p-6 rounded-3xl border border-neutral-800 animate-fade relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-jamaica-gradient"></div>
                                <div className="flex justify-between items-center mb-8 mt-2">
                                    <div className="flex flex-col items-center gap-2"><FlagImage code={selectedMatch.teamA.flag} className="w-16 h-11"/><p className="text-green-500 font-black text-xs uppercase">{selectedMatch.teamA.name}</p></div>
                                    <div className="text-5xl font-black text-white">{selectedMatch.teamA.goals} : {selectedMatch.teamB.goals}</div>
                                    <div className="flex flex-col items-center gap-2"><FlagImage code={selectedMatch.teamB.flag} className="w-16 h-11"/><p className="text-yellow-400 font-black text-xs uppercase">{selectedMatch.teamB.name}</p></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4 mb-8">
                                    <StatBar label="GOLS" valA={selectedMatch.teamA.goals} valB={selectedMatch.teamB.goals} />
                                    <StatBar label="FALTAS" valA={selectedMatch.teamA.fouls} valB={selectedMatch.teamB.fouls} />
                                    <StatBar label="ESCANTEIOS" valA={selectedMatch.teamA.corners} valB={selectedMatch.teamB.corners} />
                                    <StatBar label="CHUTES" valA={selectedMatch.teamA.shotsTotal || 0} valB={selectedMatch.teamB.shotsTotal || 0} />
                                </div>
                                <div className="h-48 overflow-y-auto no-scrollbar border-t border-neutral-800 pt-4 font-mono text-[10px] space-y-2">
                                    <p className="text-neutral-500 font-black border-b border-neutral-900 pb-1 uppercase">Elenco e Desempenho</p>
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="space-y-1">
                                            {selectedMatch.teamA.players.map(p=>(<div key={p.id} className="flex justify-between text-green-500/80"><span>#{p.number} {p.name}</span><span>⚽{p.goals} 🤝{p.assists||0}</span></div>))}
                                        </div>
                                        <div className="space-y-1">
                                            {selectedMatch.teamB.players.map(p=>(<div key={p.id} className="flex justify-between text-yellow-500/80"><span>#{p.number} {p.name}</span><span>⚽{p.goals} 🤝{p.assists||0}</span></div>))}
                                        </div>
                                    </div>
                                </div>
                                <button onClick={()=>setSelectedMatch(null)} className="mt-6 w-full py-4 bg-neutral-900 border border-neutral-800 rounded-2xl font-black uppercase text-sm">FECHAR SÚMULA</button>
                            </div>
                        ) : historyTab === 'TABLE' ? (
                            <div className="bg-[#0d0d0d] border border-neutral-800 rounded-2xl overflow-hidden shadow-xl animate-fade">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm text-slate-300">
                                        <thead className="bg-neutral-900/80 text-[10px] uppercase font-black text-neutral-500">
                                            <tr>
                                                <th className="px-4 py-4 text-center">Pos</th>
                                                <th className="px-4 py-4">Time</th>
                                                <th className="px-3 py-4 text-center">Pts</th>
                                                <th className="px-3 py-4 text-center">P</th>
                                                <th className="px-3 py-4 text-center">V</th>
                                                <th className="px-3 py-4 text-center">E</th>
                                                <th className="px-3 py-4 text-center">D</th>
                                                <th className="px-3 py-4 text-center">GP</th>
                                                <th className="px-3 py-4 text-center">GC</th>
                                                <th className="px-3 py-4 text-center">SG</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-neutral-800/50">
                                            {getStandings().map((team, idx) => (
                                                <tr key={idx} className="hover:bg-neutral-800/30 transition-colors">
                                                    <td className="px-4 py-3 text-center font-bold text-neutral-500">{idx + 1}º</td>
                                                    <td className="px-4 py-3 font-bold text-white flex items-center gap-2">
                                                        <FlagImage code={team.flag} className="w-6 h-4" />
                                                        <span className="truncate max-w-[100px] md:max-w-[200px]">{team.name}</span>
                                                    </td>
                                                    <td className="px-3 py-3 text-center font-black text-green-500">{team.pts}</td>
                                                    <td className="px-3 py-3 text-center font-mono">{team.p}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.v}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.e}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.d}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.gp}</td>
                                                    <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.gc}</td>
                                                    <td className="px-3 py-3 text-center font-mono font-bold text-white">{team.gp - team.gc}</td>
                                                </tr>
                                            ))}
                                            {getStandings().length === 0 && (
                                                <tr><td colSpan="10" className="px-4 py-10 text-center font-mono italic text-neutral-600">Nenhum dado para a classificação.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-fade">
                                {matchHistory.map(m=>(
                                    <div key={m.id} onClick={()=>setSelectedMatch(m)} className="bg-[#0d0d0d] p-5 rounded-2xl border border-neutral-800 flex justify-between items-center hover:border-green-500 transition-all cursor-pointer group shadow-xl">
                                        <div className="flex flex-col"><span className="text-[10px] text-neutral-600 font-mono mb-1">{m.dateString}</span><div className="flex items-center gap-2 text-green-500 font-black text-sm uppercase"><FlagImage code={m.teamA.flag} className="w-8 h-5"/> <span className="truncate w-20 md:w-full">{m.teamA.name}</span></div></div>
                                        <div className="text-3xl font-black text-white">{m.teamA.goals} - {m.teamB.goals}</div>
                                        <div className="flex flex-col items-end"><div className="flex items-center gap-2 text-yellow-400 font-black text-sm uppercase"><span className="truncate w-20 md:w-full text-right">{m.teamB.name}</span> <FlagImage code={m.teamB.flag} className="w-8 h-5"/></div></div>
                                        <button onClick={(e)=>{ e.stopPropagation(); if(confirm("Apagar súmula permanentemente?")) deleteDoc(doc(db, 'artifacts', appRootId, 'users', user.uid, 'matches', m.id)); }} className="ml-4 p-3 text-neutral-700 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-all hidden md:block"><Trash2 size={20}/></button>
                                    </div>
                                ))}
                                {matchHistory.length === 0 && <div className="text-center py-20 bg-[#0d0d0d] rounded-3xl border border-neutral-900 text-neutral-600 font-mono italic">Nenhum registro no banco de dados.</div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
