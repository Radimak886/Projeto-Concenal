<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Súmula Digital Pro - Kelvin</title>
    
    <!-- Bibliotecas Base -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #050505; color: #e5e5e5; font-family: sans-serif; overflow-x: hidden; }
        
        /* Animações Premium */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        .animate-fade { animation: fadeInUp 0.3s ease-out forwards; }
        .animate-pop { animation: pop 0.2s ease-out; }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
        .undo-active { animation: pulseRed 2s infinite; border-color: #ef4444 !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .bg-jamaica-gradient { background: linear-gradient(to right, #22c55e, #eab308, #000); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        
        // --- ÍCONES PHOSPHOR ---
        const Play = ({size}) => <i className="ph-fill ph-play" style={{fontSize: size}}></i>;
        const Square = ({size}) => <i className="ph-fill ph-square" style={{fontSize: size}}></i>;
        const Trophy = ({size}) => <i className="ph-fill ph-trophy" style={{fontSize: size}}></i>;
        const Shield = ({size}) => <i className="ph-fill ph-shield-check" style={{fontSize: size}}></i>;
        const Target = ({size}) => <i className="ph-fill ph-target" style={{fontSize: size}}></i>;
        const AlertTriangle = ({size}) => <i className="ph-fill ph-warning" style={{fontSize: size}}></i>;
        const Clock = ({size, className}) => <i className={`ph-fill ph-clock ${className||''}`} style={{fontSize: size}}></i>;
        const Zap = ({size}) => <i className="ph-fill ph-lightning" style={{fontSize: size}}></i>;
        const Activity = ({size}) => <i className="ph-fill ph-activity" style={{fontSize: size}}></i>;
        const Award = ({size}) => <i className="ph-fill ph-medal" style={{fontSize: size}}></i>;
        const UserPlus = ({size}) => <i className="ph-fill ph-user-plus" style={{fontSize: size}}></i>;
        const ArrowRight = ({size}) => <i className="ph-bold ph-arrow-right" style={{fontSize: size}}></i>;
        const Trash2 = ({size}) => <i className="ph-fill ph-trash" style={{fontSize: size}}></i>;
        const Pause = ({size}) => <i className="ph-fill ph-pause" style={{fontSize: size}}></i>;
        const FastForward = ({size}) => <i className="ph-fill ph-fast-forward" style={{fontSize: size}}></i>;
        const Flag = ({size}) => <i className="ph-fill ph-flag" style={{fontSize: size}}></i>;
        const Database = ({size, className}) => <i className={`ph-fill ph-database ${className||''}`} style={{fontSize: size}}></i>;
        const HistoryIcon = ({size}) => <i className="ph-bold ph-clock-counter-clockwise" style={{fontSize: size}}></i>;
        const ArrowLeft = ({size}) => <i className="ph-bold ph-arrow-left" style={{fontSize: size}}></i>;
        const Crosshair = ({size}) => <i className="ph-bold ph-crosshair" style={{fontSize: size}}></i>;
        const Wind = ({size}) => <i className="ph-bold ph-wind" style={{fontSize: size}}></i>;
        const FileText = ({size}) => <i className="ph-fill ph-file-text" style={{fontSize: size}}></i>;
        const Plus = ({size}) => <i className="ph-bold ph-plus" style={{fontSize: size}}></i>;
        const Handshake = ({size}) => <i className="ph-fill ph-handshake" style={{fontSize: size}}></i>;
        const Eraser = ({size}) => <i className="ph-fill ph-eraser" style={{fontSize: size}}></i>;

        // --- CONFIGURAÇÃO FIREBASE (Credenciais do Kelvin) ---
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBwgLd5qV_cClw7VGKUq3j5rdzRzNoc_68",
            authDomain: "arbitragem-8f746.firebaseapp.com",
            projectId: "arbitragem-8f746",
            storageBucket: "arbitragem-8f746.firebasestorage.app",
            messagingSenderId: "816911924211",
            appId: "1:816911924211:web:1fb487f5d13b75ad30b086",
            measurementId: "G-LM7BLGMHQL"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appRootId = "arbitragem-kelvin-final"; 

        // --- SISTEMA DE ÁUDIO MAKER ---
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playSfx = (type) => {
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const playNote = (freq, start, duration, wave='square') => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = wave;
                    osc.frequency.setValueAtTime(freq, start);
                    gain.gain.setValueAtTime(0.08, start);
                    gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(start);
                    osc.stop(start + duration);
                };
                if (type === 'start') playNote(1000, now, 0.4);
                else if (type === 'end') { playNote(1000, now, 0.3); playNote(1000, now+0.4, 0.3); playNote(1000, now+0.8, 1.0); }
                else if (type === 'goal') { playNote(523, now, 0.15, 'triangle'); playNote(659, now+0.1, 0.15, 'triangle'); playNote(784, now+0.2, 0.4, 'triangle'); }
                else if (type === 'assist') { playNote(1200, now, 0.1, 'sine'); playNote(1600, now+0.05, 0.2, 'sine'); }
                else if (type === 'shot') { playNote(800, now, 0.05); playNote(400, now+0.05, 0.1); }
            } catch (e) {}
        };

        // --- BANDEIRAS ---
        const COUNTRY_FLAGS = [
            { code: 'br', name: 'Brasil' }, { code: 'jm', name: 'Jamaica' },
            { code: 'ar', name: 'Argentina' }, { code: 'uy', name: 'Uruguai' },
            { code: 'co', name: 'Colômbia' }, { code: 'cl', name: 'Chile' },
            { code: 'pe', name: 'Peru' }, { code: 'us', name: 'EUA' },
            { code: 'mx', name: 'México' }, { code: 'ca', name: 'Canadá' },
            { code: 'gb-eng', name: 'Inglaterra' }, { code: 'es', name: 'Espanha' },
            { code: 'fr', name: 'França' }, { code: 'de', name: 'Alemanha' },
            { code: 'it', name: 'Itália' }, { code: 'pt', name: 'Portugal' }
        ];

        const FlagImage = ({ code, className }) => {
            if (!code) return <div className={`bg-neutral-800 flex items-center justify-center rounded ${className}`}><i className="ph ph-flag text-neutral-600"></i></div>;
            return <img src={`https://flagcdn.com/${code}.svg`} className={`object-cover rounded shadow-sm border border-neutral-800 ${className}`} />;
        };

        // --- COMPONENTE GRÁFICO ---
        const StatBar = ({ label, valA, valB }) => {
            const total = valA + valB || 1;
            const pctA = (valA / total) * 100;
            return (
                <div className="mb-3 w-full">
                    <div className="flex justify-between items-center text-[10px] font-bold text-neutral-300 mb-1 uppercase tracking-tighter px-1">
                        <span className="w-8 font-mono text-base text-green-500">{valA}</span>
                        <span className="flex-1 text-center">{label}</span>
                        <span className="w-8 text-right font-mono text-base text-yellow-400">{valB}</span>
                    </div>
                    <div className="h-1.5 w-full bg-[#111] rounded-full flex overflow-hidden border border-neutral-900">
                        <div style={{ width: `${pctA}%` }} className="h-full bg-green-500 transition-all duration-700"></div>
                        <div style={{ width: `${100 - pctA}%` }} className="h-full bg-yellow-400 transition-all duration-700"></div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [matchHistory, setMatchHistory] = useState([]);
            const [selectedMatch, setSelectedMatch] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [appState, setAppState] = useState('SETUP'); 
            const [time, setTime] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [period, setPeriod] = useState('1º Tempo');
            const [timeline, setTimeline] = useState([]);
            const [isUndoMode, setIsUndoMode] = useState(false);
            const [matchConfig, setMatchConfig] = useState({ durationMinutes: 10, goalLimit: 3 });

            const getInitialTeams = () => ({
                A: { name: '', flag: null, color: 'green', goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: [] },
                B: { name: '', flag: null, color: 'yellow', goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: [] }
            });

            const [teams, setTeams] = useState(getInitialTeams());
            const [motm, setMotm] = useState(null);
            const [newPlayer, setNewPlayer] = useState({ A: { name: '', number: '', hist: '' }, B: { name: '', number: '', hist: '' } });
            const [activeFlagPicker, setActiveFlagPicker] = useState(null);
            const [animatingPlayer, setAnimatingPlayer] = useState(null);

            // CORREÇÃO DA AUTENTICAÇÃO COM FALLBACK PARA PROJETOS PRÓPRIOS
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // Tenta usar o token customizado do ambiente (funciona no sandbox)
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenErr) {
                                // Se o token não bater com o projeto do usuário (mismatch), usa o anônimo
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Erro fatal na configuração de autenticação:", e);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // ESCUTA DO BANCO DE DADOS (APENAS APÓS AUTH)
            useEffect(() => {
                if (!user) return;
                const ref = collection(db, 'artifacts', appRootId, 'users', user.uid, 'matches');
                const unsubscribe = onSnapshot(ref, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMatchHistory(data.sort((a,b) => b.timestamp - a.timestamp));
                }, (error) => {
                    console.error("Erro ao buscar histórico no Firestore:", error);
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                let interval;
                if (isTimerRunning && appState === 'MATCH') {
                    interval = setInterval(() => {
                        setTime(t => {
                            if (t <= 1) { playSfx('end'); setIsTimerRunning(false); return 0; }
                            return t - 1;
                        });
                    }, 1000);
                } else clearInterval(interval);
                return () => clearInterval(interval);
            }, [isTimerRunning, appState]);

            const handlePlayerAction = (teamId, playerId, action) => {
                const team = teams[teamId];
                const player = team.players.find(p => p.id === playerId);
                if (!player) return;

                let up = { ...player };
                let ut = { ...team };
                setAnimatingPlayer(playerId);
                setTimeout(() => setAnimatingPlayer(null), 300);

                if (isUndoMode) {
                    if (action === 'GOAL' && up.goals > 0) { up.goals--; ut.goals--; ut.shotsTotal--; ut.shotsOnTarget--; addEvent('ANULADO', `Gol de ${up.name} removido`, 'text-red-400'); }
                    else if (action === 'ASSIST' && up.assists > 0) { up.assists--; addEvent('CORREÇÃO', `Assist. de ${up.name} removida`, 'text-neutral-500'); }
                    else if (action === 'YELLOW' && up.yellows > 0) { up.yellows--; if(up.yellows < 2) up.reds = 0; addEvent('CORREÇÃO', `Amarelo de ${up.name} removido`, 'text-neutral-500'); }
                    else if (action === 'RED' && up.reds > 0) { up.reds = 0; addEvent('CORREÇÃO', `Vermelho de ${up.name} removido`, 'text-neutral-500'); }
                } else {
                    if (action === 'GOAL') {
                        up.goals++; ut.goals++; ut.shotsTotal++; ut.shotsOnTarget++; playSfx('goal');
                        addEvent('GOL', `${up.name} (${ut.name})`, 'text-green-400 font-bold');
                        if (matchConfig.goalLimit > 0 && ut.goals >= matchConfig.goalLimit) {
                            setTeams(p => ({ ...p, [teamId]: { ...ut, players: ut.players.map(pl => pl.id === playerId ? up : pl) } }));
                            playSfx('end'); setIsTimerRunning(false); setTimeout(() => setAppState('DASHBOARD'), 1000); return;
                        }
                    } else if (action === 'ASSIST') {
                        up.assists = (up.assists || 0) + 1; playSfx('assist'); addEvent('ASSIST.', `${up.name}`, 'text-blue-400');
                    } else if (action === 'YELLOW') {
                        if (up.reds > 0) return; up.yellows++; addEvent('AMARELO', up.name, 'text-yellow-400');
                        if (up.yellows === 2) { up.reds = 1; addEvent('EXPULSÃO', `${up.name} (2º Amarelo)`, 'text-red-500 font-bold'); }
                    } else if (action === 'RED') {
                        if (up.reds > 0) return; up.reds = 1; addEvent('VERMELHO', `${up.name} expulso`, 'text-red-500 font-bold');
                    }
                }
                setTeams(p => ({ ...p, [teamId]: { ...ut, players: ut.players.map(pl => pl.id === playerId ? up : pl) } }));
            };

            const formatTime = (seconds) => `${Math.floor(seconds / 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;
            const addEvent = (type, desc, color) => {
                setTimeline(p => [{ time: `${period} - ${Math.floor(time/60)}'`, type, description: desc, colorClass: color }, ...p]);
            };

            const saveMatch = async () => {
                if(!user) return;
                setIsSaving(true);
                try {
                    const allP = [...teams.A.players, ...teams.B.players];
                    const scorer = allP.reduce((m, p) => (p.goals > (m?.goals || 0) ? p : m), null);
                    const data = { 
                        timestamp: Date.now(), 
                        dateString: new Date().toLocaleString('pt-BR'), 
                        teamA: teams.A, 
                        teamB: teams.B, 
                        timeline, 
                        highlights: { motm: motm?.name || '---', topScorer: scorer?.goals > 0 ? scorer.name : '---' } 
                    };
                    await addDoc(collection(db, 'artifacts', appRootId, 'users', user.uid, 'matches'), data);
                    setTeams(getInitialTeams()); setTimeline([]); setAppState('HISTORY');
                } catch(e){
                    console.error("Erro ao salvar no banco:", e);
                } finally { setIsSaving(false); }
            };

            // --- UI RENDER ---
            if (appState === 'SETUP') return (
                <div className="min-h-screen p-2 md:p-6 animate-fade">
                    <div className="max-w-5xl mx-auto space-y-4">
                        <div className="bg-[#0d0d0d] p-4 md:p-6 rounded-2xl border border-neutral-800 flex flex-col md:flex-row justify-between items-center gap-4 relative">
                            <div className="absolute top-0 left-0 w-full h-1 bg-jamaica-gradient rounded-t-2xl"></div>
                            <div className="text-center md:text-left">
                                <h1 className="text-2xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-yellow-400 uppercase tracking-tighter">Súmula Digital</h1>
                                <p className="text-[10px] text-neutral-500 font-mono mt-1 flex items-center justify-center md:justify-start gap-2">
                                    <Database size={12} className={user ? "text-green-500" : "text-yellow-500"}/> Nuvem: {user ? <span className="text-green-400">Conectada</span> : <span className="text-yellow-500">Conectando...</span>}
                                </p>
                            </div>
                            <div className="flex gap-2">
                                <div className="bg-black/50 p-2 rounded-xl border border-neutral-800 flex gap-2">
                                    <div className="flex flex-col"><label className="text-[8px] text-neutral-500 font-bold text-center uppercase">Tempo</label><input type="number" className="w-10 bg-transparent text-center text-sm font-bold text-white outline-none" value={matchConfig.durationMinutes} onChange={e=>setMatchConfig(p=>({...p, durationMinutes: parseInt(e.target.value)||0}))} /></div>
                                    <div className="w-px bg-neutral-800 h-6 my-auto"></div>
                                    <div className="flex flex-col"><label className="text-[8px] text-neutral-500 font-bold text-center uppercase">Gols</label><input type="number" className="w-10 bg-transparent text-center text-sm font-bold text-white outline-none" value={matchConfig.goalLimit} onChange={e=>setMatchConfig(p=>({...p, goalLimit: parseInt(e.target.value)||0}))} /></div>
                                </div>
                                <button onClick={()=>setAppState('HISTORY')} className="p-3 bg-[#111] rounded-xl border border-neutral-800 text-green-500 active:scale-95"><HistoryIcon size={20}/></button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            {['A', 'B'].map((t) => (
                                <div key={t} className="bg-[#0d0d0d] rounded-2xl border border-neutral-800 flex flex-col overflow-visible shadow-lg animate-fade">
                                    <div className={`p-3 md:p-5 border-b border-neutral-800 flex items-center gap-4 ${t==='A'?'bg-green-500/5':'bg-yellow-500/5'}`}>
                                        <div className="relative">
                                            <button onClick={()=>setActiveFlagPicker(activeFlagPicker===t?null:t)} className="w-12 h-8 md:w-16 md:h-11 shadow-lg active:scale-90 transition-transform"><FlagImage code={teams[t].flag} className="w-full h-full" /></button>
                                            {activeFlagPicker===t && (
                                                <div className="absolute top-12 left-0 z-50 bg-[#1a1a1a] border border-neutral-700 rounded-xl p-2 grid grid-cols-4 gap-2 w-64 h-48 overflow-y-auto no-scrollbar shadow-2xl">
                                                    {COUNTRY_FLAGS.map(c=>(<button key={c.code} onClick={()=>{setTeams(p=>({...p,[t]:{...p[t],flag:c.code}}));setActiveFlagPicker(null)}} className="p-1 hover:bg-neutral-800 rounded-lg"><FlagImage code={c.code} className="w-full h-7" /></button>))}
                                                </div>
                                            )}
                                        </div>
                                        <input className="bg-transparent text-xl md:text-3xl font-black text-white outline-none w-full uppercase placeholder-neutral-800" value={teams[t].name} onChange={e=>setTeams(p=>({...p,[t]:{...p[t],name:e.target.value.toUpperCase()}}))} placeholder="NOME DO TIME" />
                                    </div>
                                    <div className="p-4 bg-black/20 border-b border-neutral-800 space-y-3">
                                        <div className="flex gap-2">
                                            <input type="number" placeholder="Nº" className="w-14 bg-[#111] border border-neutral-800 rounded-lg p-2 text-center text-sm text-white font-mono" value={newPlayer[t].number} onChange={e=>setNewPlayer(p=>({...p,[t]:{...p[t],number:e.target.value}}))} />
                                            <input type="text" placeholder="NOME DO ATLETA" className="flex-1 bg-[#111] border border-neutral-800 rounded-lg p-2 text-sm text-white uppercase font-bold" value={newPlayer[t].name} onChange={e=>setNewPlayer(p=>({...p,[t]:{...p[t],name:e.target.value}}))} />
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="number" placeholder="C.A. ANTERIOR" className="flex-1 bg-[#111] border border-neutral-800 rounded-lg p-2 text-xs text-yellow-400 font-bold" value={newPlayer[t].hist} onChange={e=>setNewPlayer(p=>({...p,[t]:{...p[t],hist:e.target.value}}))} />
                                            <button onClick={()=>{const d=newPlayer[t]; if(d.name&&d.number) {const np={id:Math.random().toString(36).substr(2,9),name:d.name.toUpperCase(),number:parseInt(d.number),goals:0,assists:0,yellows:0,reds:0,historicYellows:parseInt(d.hist)||0}; setTeams(p=>({...p,[t]:{...p[t],players:[...p[t].players,np]}})); setNewPlayer(p=>({...p,[t]:{name:'',number:'',hist:''}}));}}} className={`px-8 py-2 rounded-lg font-black text-black active:scale-95 ${t==='A'?'bg-green-500':'bg-yellow-400'}`}><UserPlus size={18}/></button>
                                        </div>
                                    </div>
                                    <div className="p-3 h-52 overflow-y-auto space-y-2 no-scrollbar">
                                        {teams[t].players.map(p=>(
                                            <div key={p.id} className="flex justify-between items-center bg-[#111] p-3 rounded-xl border border-neutral-800 animate-slide">
                                                <div className="flex items-center gap-3"><span className={`font-mono text-xs px-2 py-1 rounded text-black font-black ${t==='A'?'bg-green-500':'bg-yellow-400'}`}>{p.number}</span><span className="font-bold text-sm text-white uppercase">{p.name}</span></div>
                                                <button onClick={()=>setTeams(p_=>({...p_,[t]:{...p_[t],players:p_[t].players.filter(pl=>pl.id!==p.id)}}))} className="p-2 text-neutral-600 hover:text-red-500 active:scale-90"><Trash2 size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={()=>{ if(!teams.A.name||!teams.B.name) return alert("Defina os times!"); playSfx('start'); setTime(matchConfig.durationMinutes*60); setAppState('MATCH'); }} className="w-full bg-gradient-to-r from-green-600 to-green-500 text-white text-xl font-black py-5 rounded-2xl shadow-xl active:scale-95 uppercase tracking-widest border border-green-400/30">Começar Jogo Oficial</button>
                    </div>
                </div>
            );

            if (appState === 'MATCH') return (
                <div className="min-h-screen p-2 md:p-4 flex flex-col gap-3">
                    <div className={`bg-[#0d0d0d] p-4 rounded-2xl border border-neutral-800 shadow-2xl flex flex-col md:flex-row justify-between items-center gap-4 relative overflow-hidden ${isUndoMode?'undo-active':''}`}>
                        <div className="absolute top-0 left-0 w-full h-1 bg-jamaica-gradient"></div>
                        <div className="flex md:hidden w-full justify-between items-center">
                            <button onClick={()=>setIsUndoMode(!isUndoMode)} className={`px-2 py-1 rounded text-[9px] font-black uppercase flex items-center gap-1 border ${isUndoMode?'bg-red-500 border-red-300 text-white':'bg-neutral-800 border-neutral-700 text-neutral-400'}`}><Eraser size={12}/>{isUndoMode?'CORREÇÃO':'NORMAL'}</button>
                            <div className="flex gap-2">
                                <button onClick={()=>setTime(t=>t+60)} className="p-2 rounded-lg bg-neutral-900 border border-neutral-800 text-blue-400"><Plus size={16}/></button>
                                <button onClick={()=>setIsTimerRunning(!isTimerRunning)} className={`p-2 rounded-lg text-black ${isTimerRunning?'bg-yellow-400':'bg-green-500'}`}>{isTimerRunning?<Pause size={16}/>:<Play size={16}/>}</button>
                                <button onClick={()=>{playSfx('end'); setAppState('DASHBOARD');}} className="p-2 rounded-lg bg-red-600 text-white"><Flag size={16}/></button>
                            </div>
                        </div>
                        <div className="flex w-full md:w-auto items-center justify-between md:justify-end gap-3 flex-1">
                            <h2 className="text-xl md:text-3xl font-black text-green-500 uppercase truncate max-w-[150px]">{teams.A.name}</h2>
                            <FlagImage code={teams.A.flag} className="w-10 h-7 md:w-16 md:h-11" />
                        </div>
                        <div className="flex flex-col items-center bg-black/40 px-6 py-2 rounded-2xl border border-neutral-800 w-full md:w-auto relative">
                            <button onClick={()=>setIsUndoMode(!isUndoMode)} className={`hidden md:flex absolute -top-3 px-3 py-1 rounded-full text-[9px] font-bold border transition-all ${isUndoMode ? 'bg-red-500 text-white border-red-400' : 'bg-neutral-800 text-neutral-500 border-neutral-700'}`}><Eraser size={10}/> {isUndoMode ? 'CORREÇÃO ATIVA' : 'MODO NORMAL'}</button>
                            <div className="text-5xl md:text-7xl font-black font-mono flex items-center gap-4">{teams.A.goals}<span className="text-neutral-700 text-3xl">:</span>{teams.B.goals}</div>
                            <div className="flex items-center gap-2 text-yellow-400 font-mono font-black text-xl mt-1 md:text-2xl"><Clock size={18} className={isTimerRunning?"animate-pulse":""}/> {formatTime(time)}</div>
                        </div>
                        <div className="flex w-full md:w-auto items-center justify-between md:justify-start gap-3 flex-1 flex-row-reverse md:flex-row">
                            <h2 className="text-xl md:text-3xl font-black text-yellow-400 uppercase truncate max-w-[150px]">{teams.B.name}</h2>
                            <FlagImage code={teams.B.flag} className="w-10 h-7 md:w-16 md:h-11" />
                        </div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-3 flex-1">
                        {['A', 'B'].map((t) => (
                            <div key={t} className={`col-span-1 lg:col-span-4 bg-[#0d0d0d] border-t-4 rounded-2xl flex flex-col h-[420px] md:h-auto overflow-hidden ${t==='A'?'border-green-500':'border-yellow-400'}`}>
                                <div className="p-3 border-b border-neutral-800 text-center font-bold uppercase text-[10px] text-neutral-500 flex items-center justify-center gap-2 uppercase tracking-widest"><FlagImage code={teams[t].flag} className="w-4 h-3"/> {t==='A'?'MANDANTE':'VISITANTE'}</div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-2 no-scrollbar">
                                    {teams[t].players.map(p=>(
                                        <div key={p.id} className={`bg-[#050505] p-2 rounded-xl border border-neutral-800 transition-all ${animatingPlayer===p.id?'animate-pop':''} ${p.reds>0?'opacity-30':''}`}>
                                            <div className="flex justify-between items-center mb-1.5">
                                                <div className="flex items-center gap-2"><span className={`font-mono text-[9px] px-1.5 py-0.5 rounded text-black font-black ${t==='A'?'bg-green-500':'bg-yellow-400'}`}>{p.number}</span><span className="font-bold text-[11px] text-white uppercase truncate max-w-[80px]">{p.name}</span></div>
                                                <div className="flex gap-1 items-center">{motm?.id===p.id&&<Award size={14} className="text-yellow-400"/>}{p.assists>0&&<span className="text-[10px] text-blue-400 font-black"><Handshake size={12}/>{p.assists}</span>}{Array.from({length:p.goals}).map((_,i)=><span key={i} className="text-[10px]">⚽</span>)}{Array.from({length:p.yellows}).map((_,i)=><div key={i} className="w-1.5 h-2.5 bg-yellow-400 rounded-sm shadow-sm shadow-yellow-500/20"></div>)}{p.reds>0&&<div className="w-1.5 h-2.5 bg-red-500 rounded-sm shadow-sm shadow-red-500/20"></div>}</div>
                                            </div>
                                            {p.reds===0 && (
                                                <div className="grid grid-cols-5 gap-1 pt-1.5 border-t border-neutral-900">
                                                    {!isUndoMode && <button onClick={()=>setMotm(p)} className="flex-1 py-1.5 bg-[#111] text-neutral-500 rounded flex justify-center"><i className="ph-bold ph-star text-xs"></i></button>}
                                                    <button onClick={()=>handlePlayerAction(t,p.id,'GOAL')} className={`py-1.5 rounded font-black text-[10px] flex justify-center items-center ${isUndoMode?'bg-red-900/20 text-red-500':'bg-neutral-800 text-green-500'}`}>{isUndoMode?'-⚽':'⚽'}</button>
                                                    <button onClick={()=>handlePlayerAction(t,p.id,'ASSIST')} className={`py-1.5 rounded font-black text-[10px] flex justify-center items-center ${isUndoMode?'bg-red-900/20 text-red-500':'bg-neutral-800 text-blue-400'}`}>{isUndoMode?'-🤝':'🤝'}</button>
                                                    <button onClick={()=>handlePlayerAction(t,p.id,'YELLOW')} className={`py-1.5 rounded font-black text-[10px] flex justify-center items-center ${isUndoMode?'bg-red-900/20 text-red-500':'bg-neutral-800 text-yellow-500'}`}>{isUndoMode?'-🟨':'🟨'}</button>
                                                    <button onClick={()=>handlePlayerAction(t,p.id,'RED')} className={`py-1.5 rounded font-black text-[10px] flex justify-center items-center ${isUndoMode?'bg-red-900/20 text-red-500':'bg-neutral-800 text-red-500'}`}>{isUndoMode?'-🟥':'🟥'}</button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-6 gap-1 p-2 bg-black/40 border-t border-neutral-800">
                                    <button onClick={()=>{ if(isUndoMode) { if(teams[t].corners > 0) setTeams(prev=>({...prev, [t]: {...prev[t], corners: prev[t].corners - 1}})); } else { setTeams(prev=>({...prev, [t]: {...prev[t], corners: prev[t].corners + 1}})); addEvent('CANTO', teams[t].name, 'text-neutral-400'); } }} className={`col-span-2 py-2 rounded-lg border border-neutral-800 text-[8px] font-bold uppercase ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-green-400'}`}><Target size={12}/> {teams[t].corners}</button>
                                    <button onClick={()=>{ if(isUndoMode) { if(teams[t].throwIns > 0) setTeams(prev=>({...prev, [t]: {...prev[t], throwIns: prev[t].throwIns - 1}})); } else { setTeams(prev=>({...prev, [t]: {...prev[t], throwIns: prev[t].throwIns + 1}})); addEvent('LATERAL', teams[t].name, 'text-neutral-400'); } }} className={`col-span-2 py-2 rounded-lg border border-neutral-800 text-[8px] font-bold uppercase ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-yellow-400'}`}><ArrowRight size={12}/> {teams[t].throwIns}</button>
                                    <button onClick={()=>{ if(isUndoMode) { if(teams[t].fouls > 0) setTeams(prev=>({...prev, [t]: {...prev[t], fouls: prev[t].fouls - 1}})); } else { setTeams(prev=>({...prev, [t]: {...prev[t], fouls: prev[t].fouls + 1}})); addEvent('FALTA', teams[t].name, 'text-orange-500'); } }} className={`col-span-2 py-2 rounded-lg border border-neutral-800 text-[8px] font-bold uppercase ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-orange-500'}`}><AlertTriangle size={12}/> {teams[t].fouls}</button>
                                    <button onClick={()=>{ if(isUndoMode) { setTeams(prev=>({...prev, [t]: {...prev[t], shotsTotal: Math.max(0, prev[t].shotsTotal - 1), shotsOnTarget: Math.max(0, prev[t].shotsOnTarget - 1)}})); } else { playSfx('shot'); setTeams(prev=>({...prev, [t]: {...prev[t], shotsTotal: prev[t].shotsTotal + 1, shotsOnTarget: prev[t].shotsOnTarget + 1}})); addEvent('ALVO', teams[t].name, 'text-green-400'); } }} className={`col-span-3 py-2 rounded-lg border border-neutral-800 text-[9px] font-bold uppercase ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-blue-400'}`}>{isUndoMode?'- ALVO':'ALVO'}</button>
                                    <button onClick={()=>{ if(isUndoMode) { setTeams(prev=>({...prev, [t]: {...prev[t], shotsTotal: Math.max(0, prev[t].shotsTotal - 1)}})); } else { playSfx('shot'); setTeams(prev=>({...prev, [t]: {...prev[t], shotsTotal: prev[t].shotsTotal + 1}})); addEvent('FORA', teams[t].name, 'text-neutral-500'); } }} className={`col-span-3 py-2 rounded-lg border border-neutral-800 text-[9px] font-bold uppercase ${isUndoMode?'text-red-500 bg-red-950/20':'bg-neutral-800 text-neutral-500'}`}>{isUndoMode?'- FORA':'FORA'}</button>
                                </div>
                            </div>
                        ))}
                        <div className="col-span-1 lg:col-span-4 bg-[#0d0d0d] border border-neutral-800 rounded-2xl flex flex-col h-[150px] md:h-auto overflow-hidden">
                            <div className="p-3 border-b border-neutral-800 text-center font-bold uppercase text-[9px] text-neutral-500">ÚLTIMOS EVENTOS</div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1.5 no-scrollbar font-mono text-[9px]">
                                {timeline.map((it, idx) => (
                                    <div key={idx} className="bg-black/30 p-2 rounded-lg border border-neutral-900 animate-fade flex justify-between">
                                        <span className="text-neutral-500">{it.time}</span>
                                        <span className={`${it.colorClass} font-black`}>{it.type}</span>
                                        <span className="text-neutral-400 uppercase truncate w-24 text-right">{it.description}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (appState === 'DASHBOARD') return (
                <div className="min-h-screen p-4 md:p-8 animate-fade">
                    <div className="max-w-3xl mx-auto space-y-6">
                        <h1 className="text-3xl font-black text-white uppercase text-center tracking-widest">Relatório Final</h1>
                        <div className="bg-[#0d0d0d] border border-neutral-800 rounded-3xl p-6 relative overflow-hidden shadow-2xl">
                            <div className="absolute top-0 left-0 w-full h-1 bg-jamaica-gradient"></div>
                            <div className="flex justify-between items-center mb-8 pb-4 border-b border-neutral-800">
                                <div className="w-1/4 flex flex-col items-center gap-2"><FlagImage code={teams.A.flag} className="w-14 h-9"/><h2 className="text-green-500 font-black uppercase text-[10px] truncate w-full text-center">{teams.A.name}</h2></div>
                                <div className="text-6xl md:text-8xl font-black text-white">{teams.A.goals}<span className="text-neutral-700 text-2xl px-2">X</span>{teams.B.goals}</div>
                                <div className="w-1/4 flex flex-col items-center gap-2"><FlagImage code={teams.B.flag} className="w-14 h-9"/><h2 className="text-yellow-400 font-black uppercase text-[10px] truncate w-full text-center">{teams.B.name}</h2></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="bg-black/40 p-4 rounded-xl border border-neutral-800 flex items-center gap-3 text-left"><Trophy size={24} className="text-yellow-500"/><div><p className="text-[8px] text-neutral-500 uppercase font-black">CRAQUE</p><p className="text-sm font-black text-white uppercase truncate">{motm?.name || '---'}</p></div></div>
                                <div className="bg-black/40 p-4 rounded-xl border border-neutral-800 flex items-center gap-3 text-left"><Target size={24} className="text-green-500"/><div><p className="text-[8px] text-neutral-500 uppercase font-black">ARTILHEIRO</p><p className="text-sm font-black text-white uppercase truncate">{teams.A.players.concat(teams.B.players).sort((a,b)=>b.goals-a.goals)[0]?.name || '---'}</p></div></div>
                            </div>
                            <div className="space-y-1">
                                <StatBar label="GOLS" valA={teams.A.goals} valB={teams.B.goals} />
                                <StatBar label="ASSISTÊNCIAS" valA={teams.A.players.reduce((a,b)=>a+(b.assists||0),0)} valB={teams.B.players.reduce((a,b)=>a+(b.assists||0),0)} />
                                <StatBar label="FINALIZAÇÕES" valA={teams.A.shotsTotal} valB={teams.B.shotsTotal} />
                                <StatBar label="CHUTES AO ALVO" valA={teams.A.shotsOnTarget} valB={teams.B.shotsOnTarget} />
                                <StatBar label="ESCANTREIOS" valA={teams.A.corners} valB={teams.B.corners} />
                                <StatBar label="LATERAIS" valA={teams.A.throwIns} valB={teams.B.throwIns} />
                                <StatBar label="FALTAS" valA={teams.A.fouls} valB={teams.B.fouls} />
                                <StatBar label="AMARELOS" valA={teams.A.players.reduce((a,b)=>a+b.yellows,0)} valB={teams.B.players.reduce((a,b)=>a+b.yellows,0)} />
                                <StatBar label="VERMELHOS" valA={teams.A.players.reduce((a,b)=>a+b.reds,0)} valB={teams.B.players.reduce((a,b)=>a+b.reds,0)} />
                            </div>
                        </div>
                        <div className="flex flex-col md:flex-row gap-4 justify-center">
                            <button onClick={()=>setAppState('SETUP')} className="flex-1 py-4 bg-neutral-900 border border-neutral-800 rounded-2xl text-white font-black uppercase text-sm active:scale-95">DESCARTAR</button>
                            <button onClick={saveMatch} disabled={isSaving} className="flex-1 py-4 bg-gradient-to-r from-green-600 to-green-500 text-white font-black rounded-2xl uppercase text-sm shadow-xl active:scale-95 disabled:opacity-50">{isSaving?'SALVANDO...':'SALVAR NO FIREBASE'}</button>
                        </div>
                    </div>
                </div>
            );

            if (appState === 'HISTORY') return (
                <div className="min-h-screen p-4 md:p-8 animate-fade">
                    <div className="max-w-4xl mx-auto space-y-6">
                        <div className="flex justify-between items-center border-b border-neutral-800 pb-4">
                            <h1 className="text-3xl font-black text-white uppercase flex items-center gap-3"><HistoryIcon size={32} className="text-green-500"/> ARQUIVO DIGITAL</h1>
                            <button onClick={()=>setAppState('SETUP')} className="p-3 bg-neutral-900 border border-neutral-800 rounded-xl active:scale-90"><ArrowLeft size={20}/></button>
                        </div>
                        {selectedMatch ? (
                            <div className="bg-[#0d0d0d] p-6 rounded-3xl border border-neutral-800 animate-fade relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-jamaica-gradient"></div>
                                <div className="flex justify-between items-center mb-8 mt-2">
                                    <div className="flex flex-col items-center gap-2"><FlagImage code={selectedMatch.teamA.flag} className="w-16 h-11"/><p className="text-green-500 font-black text-xs uppercase">{selectedMatch.teamA.name}</p></div>
                                    <div className="text-5xl font-black text-white">{selectedMatch.teamA.goals} : {selectedMatch.teamB.goals}</div>
                                    <div className="flex flex-col items-center gap-2"><FlagImage code={selectedMatch.teamB.flag} className="w-16 h-11"/><p className="text-yellow-400 font-black text-xs uppercase">{selectedMatch.teamB.name}</p></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4 mb-8">
                                    <StatBar label="GOLS" valA={selectedMatch.teamA.goals} valB={selectedMatch.teamB.goals} />
                                    <StatBar label="FALTAS" valA={selectedMatch.teamA.fouls} valB={selectedMatch.teamB.fouls} />
                                    <StatBar label="ESCANTREIOS" valA={selectedMatch.teamA.corners} valB={selectedMatch.teamB.corners} />
                                    <StatBar label="CHUTES" valA={selectedMatch.teamA.shotsTotal || 0} valB={selectedMatch.teamB.shotsTotal || 0} />
                                </div>
                                <div className="h-48 overflow-y-auto no-scrollbar border-t border-neutral-800 pt-4 font-mono text-[10px] space-y-2">
                                    <p className="text-neutral-500 font-black border-b border-neutral-900 pb-1 uppercase">Elenco e Desempenho</p>
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="space-y-1">
                                            {selectedMatch.teamA.players.map(p=>(<div key={p.id} className="flex justify-between text-green-500/80"><span>#{p.number} {p.name}</span><span>⚽{p.goals} 🤝{p.assists||0}</span></div>))}
                                        </div>
                                        <div className="space-y-1">
                                            {selectedMatch.teamB.players.map(p=>(<div key={p.id} className="flex justify-between text-yellow-500/80"><span>#{p.number} {p.name}</span><span>⚽{p.goals} 🤝{p.assists||0}</span></div>))}
                                        </div>
                                    </div>
                                </div>
                                <button onClick={()=>setSelectedMatch(null)} className="mt-6 w-full py-4 bg-neutral-900 border border-neutral-800 rounded-2xl font-black uppercase text-sm">FECHAR SÚMULA</button>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {matchHistory.map(m=>(
                                    <div key={m.id} onClick={()=>setSelectedMatch(m)} className="bg-[#0d0d0d] p-5 rounded-2xl border border-neutral-800 flex justify-between items-center hover:border-green-500 transition-all cursor-pointer group shadow-xl">
                                        <div className="flex flex-col"><span className="text-[10px] text-neutral-600 font-mono mb-1">{m.dateString}</span><div className="flex items-center gap-2 text-green-500 font-black text-sm uppercase"><FlagImage code={m.teamA.flag} className="w-8 h-5"/> {m.teamA.name}</div></div>
                                        <div className="text-3xl font-black text-white">{m.teamA.goals} - {m.teamB.goals}</div>
                                        <div className="flex flex-col items-end"><div className="flex items-center gap-2 text-yellow-400 font-black text-sm uppercase">{m.teamB.name} <FlagImage code={m.teamB.flag} className="w-8 h-5"/></div></div>
                                        <button onClick={(e)=>{ e.stopPropagation(); if(confirm("Apagar súmula permanentemente?")) deleteDoc(doc(db, 'artifacts', appRootId, 'users', user.uid, 'matches', m.id)); }} className="ml-4 p-3 text-neutral-700 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-all"><Trash2 size={20}/></button>
                                    </div>
                                ))}
                                {matchHistory.length === 0 && <div className="text-center py-20 bg-[#0d0d0d] rounded-3xl border border-neutral-900 text-neutral-600 font-mono italic">Nenhum registro no banco de dados.</div>}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
