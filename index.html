    <style>
        body { margin: 0; padding: 0; background-color: #050505; color: #e5e5e5; font-family: sans-serif; overflow-x: hidden; }
        
        /* Animações Maker */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        .animate-fade { animation: fadeInUp 0.3s ease-out forwards; }
        .animate-pop { animation: pop 0.2s ease-out; }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
        .undo-active { animation: pulseRed 1.5s infinite; border-color: #ef4444 !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .bg-jamaica-gradient { background: linear-gradient(to right, #22c55e, #eab308, #000); }
        .modal-overlay { background-color: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }

        const Swords = ({size, className}) => <i className={`ph-fill ph-sword ${className||''}`} style={{fontSize: size}}></i>;

        // --- CONFIGURAÇÃO FIREBASE (Credenciais do Kelvin) ---
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBwgLd5qV_cClw7VGKUq3j5rdzRzNoc_68",
            authDomain: "arbitragem-8f746.firebaseapp.com",
            projectId: "arbitragem-8f746",
            storageBucket: "arbitragem-8f746.firebasestorage.app",
            messagingSenderId: "816911924211",
            appId: "1:816911924211:web:1fb487f5d13b75ad30b086",
            measurementId: "G-LM7BLGMHQL"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appRootId = "arbitragem-kelvin-final"; 

        // --- SISTEMA DE ÁUDIO MAKER ---
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playSfx = (type) => {
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const playNote = (freq, start, duration, wave='square') => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = wave;
                    osc.frequency.setValueAtTime(freq, start);
                    gain.gain.setValueAtTime(0.08, start);
                    gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(start);
                    osc.stop(start + duration);
                };
                if (type === 'start') playNote(1000, now, 0.4);
                else if (type === 'end') { playNote(1000, now, 0.3); playNote(1000, now+0.4, 0.3); playNote(1000, now+0.8, 1.0); }
                else if (type === 'goal') { playNote(523, now, 0.15, 'triangle'); playNote(659, now+0.1, 0.15, 'triangle'); playNote(784, now+0.2, 0.4, 'triangle'); }
                else if (type === 'assist') { playNote(1200, now, 0.1, 'sine'); playNote(1600, now+0.05, 0.2, 'sine'); }
                else if (type === 'shot') { playNote(800, now, 0.05); playNote(400, now+0.05, 0.1); }
            } catch (e) {}
        };

        // --- BANDEIRAS ---
        const COUNTRY_FLAGS = [
            { code: 'br', name: 'Brasil' }, { code: 'jm', name: 'Jamaica' },
            { code: 'ar', name: 'Argentina' }, { code: 'uy', name: 'Uruguai' },
            { code: 'co', name: 'Colômbia' }, { code: 'cl', name: 'Chile' },
            { code: 'pe', name: 'Peru' }, { code: 'us', name: 'EUA' },
            { code: 'mx', name: 'México' }, { code: 'ca', name: 'Canadá' },
            { code: 'gb-eng', name: 'Inglaterra' }, { code: 'es', name: 'Espanha' },
            { code: 'fr', name: 'França' }, { code: 'de', name: 'Alemanha' },
            { code: 'it', name: 'Itália' }, { code: 'pt', name: 'Portugal' }
        ];

        const FlagImage = ({ code, className }) => {
            if (!code) return <div className={`bg-neutral-800 flex items-center justify-center rounded ${className}`}><i className="ph ph-flag text-neutral-600"></i></div>;
            return <img src={`https://flagcdn.com/${code}.svg`} className={`object-cover rounded shadow-sm border border-neutral-800 ${className}`} />;
        };

        // --- GRÁFICOS COMPONENTES ---
        const StatBar = ({ label, valA, valB }) => {
            const numA = valA || 0;
            const numB = valB || 0;
            const total = numA + numB;
            
            const isZeroZero = total === 0;
            const pctA = isZeroZero ? 50 : (numA / total) * 100;
            
            const colorClassA = isZeroZero ? 'bg-neutral-800' : 'bg-green-500';
            const colorClassB = isZeroZero ? 'bg-neutral-800' : 'bg-yellow-400';
            const textClassA = isZeroZero ? 'text-neutral-600' : 'text-green-500';
            const textClassB = isZeroZero ? 'text-neutral-600' : 'text-yellow-400';

            return (
                <div className="mb-3 w-full">
                    <div className="flex justify-between items-center text-[10px] font-bold text-neutral-300 mb-1 uppercase tracking-tighter px-1">
                        <span className={`w-8 font-mono text-base ${textClassA}`}>{numA}</span>
                        <span className="flex-1 text-center">{label}</span>
                        <span className={`w-8 text-right font-mono text-base ${textClassB}`}>{numB}</span>
                    </div>
                    <div className="h-1.5 w-full bg-[#111] rounded-full flex overflow-hidden border border-neutral-900">
                        <div style={{ width: `${pctA}%` }} className={`h-full transition-all duration-700 ${colorClassA}`}></div>
                        <div style={{ width: `${100 - pctA}%` }} className={`h-full transition-all duration-700 ${colorClassB}`}></div>
                    </div>
                </div>
            );
        };

        const PlayerBar = ({ label, value, max, color }) => {
            const pct = Math.min(((value || 0) / max) * 100, 100);
            return (
                <div className="mb-3">
                    <div className="flex justify-between text-[10px] font-bold text-neutral-400 mb-1 uppercase">
                        <span>{label}</span>
                        <span className="text-white font-mono">{value || 0}</span>
                    </div>
                    <div className="h-2 w-full bg-neutral-900 rounded-full overflow-hidden border border-neutral-800">
                        <div style={{ width: `${pct}%` }} className={`h-full ${color} transition-all duration-1000`}></div>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE DE CRÉDITOS ---
        const FooterCredits = () => (
            <div className="w-full flex justify-center pt-8 pb-4 mt-auto">
                <p className="text-[10px] text-neutral-600 font-mono uppercase tracking-widest text-center">
                    Criado por Kelvin Radimak e Felipe Gabriel
                </p>
            </div>
        );

        // --- MOTOR DE GERAÇÃO DE TORNEIOS ---
        const generateLeagueMatches = (teams, isDouble) => {
            let t = [...teams];
            if (t.length % 2 !== 0) t.push({ id: 'BYE', name: 'FOLGA' });
            let matches = [];
            let numRounds = t.length - 1;
            let half = t.length / 2;

            for (let r = 0; r < numRounds; r++) {
                for (let i = 0; i < half; i++) {
                    let home = t[i];
                    let away = t[t.length - 1 - i];
                    if (home.id !== 'BYE' && away.id !== 'BYE') {
                        matches.push({
                            id: Math.random().toString(36).substr(2, 9),
                            roundName: `Rodada ${r + 1}`,
                            homeId: home.id, awayId: away.id,
                            homeGoals: 0, awayGoals: 0, played: false
                        });
                    }
                }
                t.splice(1, 0, t.pop()); // Rotaciona
            }

            if (isDouble) {
                let returnMatches = matches.map(m => ({
                    ...m,
                    id: Math.random().toString(36).substr(2, 9),
                    roundName: `Rodada ${parseInt(m.roundName.split(' ')[1]) + numRounds} (Volta)`,
                    homeId: m.awayId, awayId: m.homeId
                }));
                matches = [...matches, ...returnMatches];
            }
            return matches;
        };

        const generateKnockoutPhase = (teamsArray, phaseName, isDouble) => {
            let matches = [];
            let shuffled = [...teamsArray].sort(() => Math.random() - 0.5);
            for (let i = 0; i < shuffled.length; i += 2) {
                if (shuffled[i + 1]) {
                    matches.push({
                        id: Math.random().toString(36).substr(2, 9),
                        roundName: phaseName,
                        homeId: shuffled[i].id, awayId: shuffled[i+1].id,
                        homeGoals: 0, awayGoals: 0, played: false
                    });
                    if (isDouble) {
                        matches.push({
                            id: Math.random().toString(36).substr(2, 9),
                            roundName: `${phaseName} (Volta)`,
                            homeId: shuffled[i+1].id, awayId: shuffled[i].id,
                            homeGoals: 0, awayGoals: 0, played: false
                        });
                    }
                }
            }
            return matches;
        };

        const getTourneyStandings = (tourney) => {
            if (!tourney || !tourney.teams) return [];
            const table = {};
            tourney.teams.forEach(t => {
                table[t.id] = { id: t.id, name: t.name, flag: t.flag, p:0, v:0, e:0, d:0, gp:0, gc:0, pts:0 };
            });
            tourney.matches.forEach(m => {
                if(!m.played) return;
                const tA = table[m.homeId];
                const tB = table[m.awayId];
                if(tA && tB) {
                    tA.p++; tB.p++;
                    tA.gp += m.homeGoals; tA.gc += m.awayGoals;
                    tB.gp += m.awayGoals; tB.gc += m.homeGoals;
                    if(m.homeGoals > m.awayGoals) { tA.v++; tA.pts+=3; tB.d++; }
                    else if(m.awayGoals > m.homeGoals) { tB.v++; tB.pts+=3; tA.d++; }
                    else { tA.e++; tB.e++; tA.pts+=1; tB.pts+=1; }
                }
            });
            return Object.values(table).sort((a,b) => {
                if(b.pts !== a.pts) return b.pts - a.pts; 
                if(b.v !== a.v) return b.v - a.v; 
                const sgA = a.gp - a.gc; const sgB = b.gp - b.gc;
                if(sgB !== sgA) return sgB - sgA; 
                return b.gp - a.gp; 
            });
        };

        function App() {
            const [user, setUser] = useState(null);
            
            // Estados Gerais
            const [matchHistory, setMatchHistory] = useState([]);
            const [tournaments, setTournaments] = useState([]);
            const [selectedMatch, setSelectedMatch] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [appState, setAppState] = useState('SETUP'); 
            const [selectedPlayerStats, setSelectedPlayerStats] = useState(null); // Modal de Gráfico Individual
            
            // Estado da Partida
            const [time, setTime] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [period, setPeriod] = useState('1º Tempo');
            const [timeline, setTimeline] = useState([]);
            const [isUndoMode, setIsUndoMode] = useState(false);
            const [matchConfig, setMatchConfig] = useState({ durationMinutes: 10, goalLimit: 3 });
            const [showBulkAdd, setShowBulkAdd] = useState(null);
            const [bulkInput, setBulkInput] = useState("");
            const [historyTab, setHistoryTab] = useState('GAMES'); 
            
            const getInitialTeams = () => ({
                A: { id: 'A', name: '', flag: null, color: 'green', goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: [] },
                B: { id: 'B', name: '', flag: null, color: 'yellow', goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: [] }
            });

            const [teams, setTeams] = useState(getInitialTeams());
            const [motm, setMotm] = useState(null);
            const [newPlayer, setNewPlayer] = useState({ A: { name: '', number: '', hist: '' }, B: { name: '', number: '', hist: '' } });
            const [activeFlagPicker, setActiveFlagPicker] = useState(null);
            const [animatingPlayer, setAnimatingPlayer] = useState(null);

            // Estados do Torneio
            const [activeTourney, setActiveTourney] = useState(null); 
            const [activeTourneyMatch, setActiveTourneyMatch] = useState(null); 
            const [tourneyTab, setTourneyTab] = useState('JOGOS'); 
            
            // Criação de Torneio
            const [newTourney, setNewTourney] = useState({ name: '', format: 'LEAGUE', doubleRound: false, teams: [] });
            const [tTeamName, setTTeamName] = useState('');
            const [tTeamFlag, setTTeamFlag] = useState(null);
            const [tTeamPlayers, setTTeamPlayers] = useState('');

            // AUTENTICAÇÃO SEGURA
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && firebaseConfig.projectId !== "arbitragem-8f746") {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        try { await signInAnonymously(auth); } catch (err) {}
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => { if (u) setUser(u); });
                return () => unsubscribe();
            }, []);

            // ESCUTA DO BANCO DE DADOS
            useEffect(() => {
                if (!user) return;
                const refMatches = collection(db, 'artifacts', appRootId, 'users', user.uid, 'matches');
                const unsubMatches = onSnapshot(refMatches, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMatchHistory(data.sort((a,b) => b.timestamp - a.timestamp));
                });

                const refTourneys = collection(db, 'artifacts', appRootId, 'users', user.uid, 'tournaments');
                const unsubTourneys = onSnapshot(refTourneys, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setTournaments(data.sort((a,b) => b.createdAt - a.createdAt));
                    
                    if (activeTourney) {
                        const updated = data.find(t => t.id === activeTourney.id);
                        if (updated) setActiveTourney(updated);
                    }
                });

                return () => { unsubMatches(); unsubTourneys(); };
            }, [user, activeTourney?.id]); 

            // CRONÔMETRO
            useEffect(() => {
                let interval;
                if (isTimerRunning && appState === 'MATCH') {
                    interval = setInterval(() => {
                        setTime(t => {
                            if (t <= 1) { playSfx('end'); setIsTimerRunning(false); return 0; }
                            return t - 1;
                        });
                    }, 1000);
                } else clearInterval(interval);
                return () => clearInterval(interval);
            }, [isTimerRunning, appState]);

            // Lógica para Tabela de Classificação Global (Aba Histórico)
            const getStandings = () => {
                const table = {};
                matchHistory.forEach(m => {
                    const tA = m.teamA.name.toUpperCase().trim();
                    const tB = m.teamB.name.toUpperCase().trim();
                    
                    if(!table[tA]) table[tA] = { name: m.teamA.name, flag: m.teamA.flag, p:0, v:0, e:0, d:0, gp:0, gc:0, pts:0 };
                    if(!table[tB]) table[tB] = { name: m.teamB.name, flag: m.teamB.flag, p:0, v:0, e:0, d:0, gp:0, gc:0, pts:0 };
                    
                    table[tA].p++; table[tB].p++;
                    table[tA].gp += m.teamA.goals; table[tA].gc += m.teamB.goals;
                    table[tB].gp += m.teamB.goals; table[tB].gc += m.teamA.goals;
                    
                    if(m.teamA.goals > m.teamB.goals) {
                        table[tA].v++; table[tA].pts += 3;
                        table[tB].d++;
                    } else if(m.teamB.goals > m.teamA.goals) {
                        table[tB].v++; table[tB].pts += 3;
                        table[tA].d++;
                    } else {
                        table[tA].e++; table[tA].pts += 1;
                        table[tB].e++; table[tB].pts += 1;
                    }
                });
                
                return Object.values(table).sort((a,b) => {
                    if(b.pts !== a.pts) return b.pts - a.pts; 
                    if(b.v !== a.v) return b.v - a.v; 
                    const sgA = a.gp - a.gc; const sgB = b.gp - b.gc;
                    if(sgB !== sgA) return sgB - sgA; 
                    return b.gp - a.gp; 
                });
            };

            const formatTime = (seconds) => `${Math.floor(seconds / 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`;
            const addEvent = (type, desc, color) => setTimeline(p => [{ time: `${period} - ${Math.floor(time/60)}'`, type, description: desc, colorClass: color }, ...p]);

            const handleResetMatch = () => {
                if(confirm("Deseja ZERAR a partida? O tempo e o placar voltarão ao início, mas os times serão mantidos.")) {
                    setIsTimerRunning(false); setTime(matchConfig.durationMinutes * 60); setTimeline([]);
                    setTeams(prev => {
                        const resetP = (players) => players.map(p => ({...p, goals: 0, assists: 0, fouls: 0, yellows: 0, reds: 0}));
                        return {
                            A: { ...prev.A, goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: resetP(prev.A.players) },
                            B: { ...prev.B, goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: resetP(prev.B.players) }
                        };
                    });
                    setMotm(null); setIsUndoMode(false);
                }
            };

            const handlePlayerAction = (teamId, playerId, action) => {
                const team = teams[teamId];
                const player = team.players.find(p => p.id === playerId);
                if (!player) return;

                let up = { ...player };
                let ut = { ...team };
                setAnimatingPlayer(playerId); setTimeout(() => setAnimatingPlayer(null), 300);

                if (isUndoMode) {
                    if (action === 'GOAL' && up.goals > 0) { up.goals--; ut.goals--; ut.shotsTotal--; ut.shotsOnTarget--; addEvent('ANULADO', `Gol de ${up.name} removido`, 'text-red-400'); }
                    else if (action === 'ASSIST' && up.assists > 0) { up.assists--; addEvent('CORREÇÃO', `Assist. de ${up.name} removida`, 'text-neutral-500'); }
                    else if (action === 'FOUL' && up.fouls > 0) { up.fouls--; ut.fouls--; addEvent('CORREÇÃO', `Falta de ${up.name} removida`, 'text-neutral-500'); }
                    else if (action === 'YELLOW' && up.yellows > 0) { up.yellows--; if(up.yellows < 2) up.reds = 0; addEvent('CORREÇÃO', `Amarelo de ${up.name} removido`, 'text-neutral-500'); }
                    else if (action === 'RED' && up.reds > 0) { up.reds = 0; addEvent('CORREÇÃO', `Vermelho de ${up.name} removido`, 'text-neutral-500'); }
                } else {
                    if (action === 'GOAL') {
                        up.goals++; ut.goals++; ut.shotsTotal++; ut.shotsOnTarget++; playSfx('goal');
                        addEvent('GOL', `${up.name} (${ut.name})`, 'text-green-400 font-bold');
                        if (matchConfig.goalLimit > 0 && ut.goals >= matchConfig.goalLimit) {
                            setTeams(p => ({ ...p, [teamId]: { ...ut, players: ut.players.map(pl => pl.id === playerId ? up : pl) } }));
                            playSfx('end'); setIsTimerRunning(false); setTimeout(() => setAppState('DASHBOARD'), 1000); return;
                        }
                    } else if (action === 'ASSIST') {
                        up.assists = (up.assists || 0) + 1; playSfx('assist'); addEvent('ASSIST.', `${up.name}`, 'text-blue-400');
                    } else if (action === 'FOUL') {
                        up.fouls = (up.fouls || 0) + 1; ut.fouls++; addEvent('FALTA IND.', `${up.name} (${ut.name})`, 'text-orange-500');
                    } else if (action === 'YELLOW') {
                        if (up.reds > 0) return; up.yellows++; addEvent('AMARELO', up.name, 'text-yellow-400');
                        if (up.yellows === 2) { up.reds = 1; addEvent('EXPULSÃO', `${up.name} (2º Amarelo)`, 'text-red-500 font-bold'); }
                    } else if (action === 'RED') {
                        if (up.reds > 0) return; up.reds = 1; addEvent('VERMELHO', `${up.name} expulso`, 'text-red-500 font-bold');
                    }
                }
                setTeams(p => ({ ...p, [teamId]: { ...ut, players: ut.players.map(pl => pl.id === playerId ? up : pl) } }));
            };

            const handleTeamAction = (teamId, action) => {
                if (isUndoMode) {
                    if (teams[teamId][action] > 0) setTeams(p => ({ ...p, [teamId]: { ...p[teamId], [action]: p[teamId][action] - 1 } }));
                } else {
                    setTeams(p => ({ ...p, [teamId]: { ...p[teamId], [action]: p[teamId][action] + 1 } }));
                    const lbls = { corners: 'Escanteio', throwIns: 'Lateral', fouls: 'Falta' };
                    addEvent(lbls[action].toUpperCase(), teams[teamId].name, 'text-neutral-400');
                }
            };

            const handleShot = (teamId, isOnTarget) => {
                if (isUndoMode) {
                    setTeams(p => ({ ...p, [teamId]: { ...p[teamId], shotsTotal: Math.max(0, p[teamId].shotsTotal - 1), shotsOnTarget: isOnTarget ? Math.max(0, p[teamId].shotsOnTarget - 1) : p[teamId].shotsOnTarget } }));
                } else {
                    playSfx('shot');
                    setTeams(p => ({ ...p, [teamId]: { ...p[teamId], shotsTotal: p[teamId].shotsTotal + 1, shotsOnTarget: isOnTarget ? p[teamId].shotsOnTarget + 1 : p[teamId].shotsOnTarget } }));
                    addEvent(isOnTarget ? 'ALVO' : 'FORA', `Chute: ${teams[teamId].name}`, isOnTarget ? 'text-green-400' : 'text-neutral-500');
                }
            };

            const processBulkAdd = (teamId) => {
                const lines = bulkInput.split('\n').filter(l => l.trim() !== "");
                let currentMaxNumber = teams[teamId].players.reduce((max, p) => Math.max(max, p.number || 0), 0);
                const newPlayersList = lines.map(line => {
                    const match = line.match(/^(\d+)[- ]*(.+)$/);
                    let num, name;
                    if (match) { num = parseInt(match[1]); name = match[2].trim().toUpperCase(); } 
                    else { currentMaxNumber++; num = currentMaxNumber; name = line.trim().toUpperCase(); }
                    return { id: Math.random().toString(36).substr(2, 9), name, number: num, goals: 0, assists: 0, fouls: 0, yellows: 0, reds: 0, historicYellows: 0 };
                });
                setTeams(p => ({ ...p, [teamId]: { ...p[teamId], players: [...p[teamId].players, ...newPlayersList] } }));
                setBulkInput(""); setShowBulkAdd(null);
            };

            const saveMatch = async () => {
                if(!user) return;
                setIsSaving(true);
                try {
                    const allP = [...teams.A.players, ...teams.B.players];
                    const scorer = allP.reduce((m, p) => (p.goals > (m?.goals || 0) ? p : m), null);
                    
                    const matchData = { 
                        timestamp: Date.now(), 
                        dateString: new Date().toLocaleString('pt-BR'), 
                        teamA: teams.A, 
                        teamB: teams.B, 
                        timeline, 
                        highlights: { motm: motm?.name || '---', topScorer: scorer?.goals > 0 ? scorer.name : '---' },
                        tournamentId: activeTourneyMatch?.tourneyId || null 
                    };

                    await addDoc(collection(db, 'artifacts', appRootId, 'users', user.uid, 'matches'), matchData);

                    if (activeTourneyMatch && activeTourney) {
                        const updatedTourney = { ...activeTourney };
                        const mIndex = updatedTourney.matches.findIndex(m => m.id === activeTourneyMatch.matchId);
                        if (mIndex > -1) {
                            updatedTourney.matches[mIndex] = { ...updatedTourney.matches[mIndex], played: true, homeGoals: teams.A.goals, awayGoals: teams.B.goals };
                        }

                        const updateTourneyPlayers = (tourneyTeamId, matchTeam) => {
                            const tIndex = updatedTourney.teams.findIndex(t => t.id === tourneyTeamId);
                            if (tIndex > -1) {
                                matchTeam.players.forEach(mp => {
                                    const tpIndex = updatedTourney.teams[tIndex].players.findIndex(p => p.name === mp.name || p.id === mp.id);
                                    if(tpIndex > -1) {
                                        updatedTourney.teams[tIndex].players[tpIndex].goals = (updatedTourney.teams[tIndex].players[tpIndex].goals || 0) + mp.goals;
                                        updatedTourney.teams[tIndex].players[tpIndex].assists = (updatedTourney.teams[tIndex].players[tpIndex].assists || 0) + mp.assists;
                                        updatedTourney.teams[tIndex].players[tpIndex].fouls = (updatedTourney.teams[tIndex].players[tpIndex].fouls || 0) + (mp.fouls || 0);
                                        updatedTourney.teams[tIndex].players[tpIndex].yellows = (updatedTourney.teams[tIndex].players[tpIndex].yellows || 0) + mp.yellows;
                                        updatedTourney.teams[tIndex].players[tpIndex].reds = (updatedTourney.teams[tIndex].players[tpIndex].reds || 0) + mp.reds;
                                    }
                                });
                            }
                        };
                        updateTourneyPlayers(teams.A.id, teams.A);
                        updateTourneyPlayers(teams.B.id, teams.B);

                        await setDoc(doc(db, 'artifacts', appRootId, 'users', user.uid, 'tournaments', updatedTourney.id), updatedTourney);
                        setActiveTourneyMatch(null);
                        setTeams(getInitialTeams()); setTimeline([]);
                        setAppState('TOURNAMENT_DASH');
                    } else {
                        setTeams(getInitialTeams()); setTimeline([]);
                        setAppState('HISTORY');
                    }
                } catch(e) { console.error("Erro ao salvar:", e); } 
                finally { setIsSaving(false); }
            };

            const handleAddTourneyTeam = () => {
                if(!tTeamName) return;
                const players = [];
                const lines = tTeamPlayers.split('\n').filter(l=>l.trim()!=='');
                let num = 1;
                lines.forEach(l => {
                    const match = l.match(/^(\d+)[- ]*(.+)$/);
                    if(match) players.push({ id: Math.random().toString(36).substr(2,9), number: parseInt(match[1]), name: match[2].trim().toUpperCase(), goals:0, assists:0, fouls:0, yellows:0, reds:0 });
                    else players.push({ id: Math.random().toString(36).substr(2,9), number: num++, name: l.trim().toUpperCase(), goals:0, assists:0, fouls:0, yellows:0, reds:0 });
                });
                setNewTourney(p => ({ ...p, teams: [...p.teams, { id: Math.random().toString(36).substr(2,9), name: tTeamName, flag: tTeamFlag, players }] }));
                setTTeamName(''); setTTeamFlag(null); setTTeamPlayers('');
            };

            const handleGenerateTournament = async () => {
                if(!newTourney.name || newTourney.teams.length < 2) return alert("Dê um nome e cadastre pelo menos 2 times!");
                setIsSaving(true);
                try {
                    let generatedMatches = [];
                    if (newTourney.format === 'LEAGUE') generatedMatches = generateLeagueMatches(newTourney.teams, newTourney.doubleRound);
                    else if (newTourney.format === 'KNOCKOUT') {
                        let phaseName = newTourney.teams.length > 4 ? 'Oitavas' : (newTourney.teams.length > 2 ? 'Semifinal' : 'Final');
                        generatedMatches = generateKnockoutPhase(newTourney.teams, phaseName, newTourney.doubleRound);
                    }
                    const tourneyData = { ...newTourney, matches: generatedMatches, createdAt: Date.now(), status: 'ACTIVE' };
                    const docRef = await addDoc(collection(db, 'artifacts', appRootId, 'users', user.uid, 'tournaments'), tourneyData);
                    setActiveTourney({ id: docRef.id, ...tourneyData });
                    setNewTourney({ name: '', format: 'LEAGUE', doubleRound: false, teams: [] });
                    setTourneyTab('JOGOS');
                    setAppState('TOURNAMENT_DASH');
                } catch(e) { console.error(e); } finally { setIsSaving(false); }
            };

            const startTourneyMatch = (match) => {
                const hT = activeTourney.teams.find(t => t.id === match.homeId);
                const aT = activeTourney.teams.find(t => t.id === match.awayId);
                const resetP = (players) => players.map(p => ({...p, goals: 0, assists: 0, fouls: 0, yellows: 0, reds: 0, historicYellows: p.yellows })); 
                setTeams({
                    A: { ...hT, goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: resetP(hT.players) },
                    B: { ...aT, goals: 0, corners: 0, throwIns: 0, fouls: 0, shotsTotal: 0, shotsOnTarget: 0, players: resetP(aT.players) }
                });
                setActiveTourneyMatch({ tourneyId: activeTourney.id, matchId: match.id });
                setTime(matchConfig.durationMinutes * 60);
                playSfx('start');
                setAppState('MATCH');
            };

            const handleAdvanceKnockout = async () => {
                if(activeTourney.format !== 'KNOCKOUT') return;
                const playedMatches = activeTourney.matches.filter(m => m.played);
                if(playedMatches.length === 0) return;
                const lastRoundName = playedMatches[playedMatches.length - 1].roundName;
                const matchesOfLastRound = activeTourney.matches.filter(m => m.roundName === lastRoundName);
                if(!matchesOfLastRound.every(m => m.played)) return alert("Você precisa finalizar todos os jogos desta fase primeiro!");
                let winners = [];
                for(let m of matchesOfLastRound) {
                    if (m.homeGoals > m.awayGoals) winners.push(activeTourney.teams.find(t => t.id === m.homeId));
                    else if (m.awayGoals > m.homeGoals) winners.push(activeTourney.teams.find(t => t.id === m.awayId));
                    else {
                        const homeT = activeTourney.teams.find(t => t.id === m.homeId);
                        const awayT = activeTourney.teams.find(t => t.id === m.awayId);
                        const winnerChoice = prompt(`Empate entre ${homeT.name} e ${awayT.name}. Quem avançou nos pênaltis? (Digite 1 para ${homeT.name}, 2 para ${awayT.name})`);
                        if (winnerChoice === '1') winners.push(homeT); else winners.push(awayT);
                    }
                }
                if(winners.length < 2) return alert("O Torneio acabou! O campeão é " + winners[0]?.name);
                let nextPhaseName = winners.length > 4 ? 'Quartas' : (winners.length > 2 ? 'Semifinal' : 'Final');
                const newMatches = generateKnockoutPhase(winners, nextPhaseName, activeTourney.doubleRound);
                const updatedTourney = { ...activeTourney, matches: [...activeTourney.matches, ...newMatches] };
                await setDoc(doc(db, 'artifacts', appRootId, 'users', user.uid, 'tournaments', updatedTourney.id), updatedTourney);
                setActiveTourney(updatedTourney);
            };

            // --- VIEWS ---

            if (appState === 'SETUP') return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col justify-center items-center animate-fade bg-[#050505]">
                    <div className="w-full max-w-4xl flex flex-col items-center flex-1 justify-center">
                        <Shield size={64} className="text-blue-500 mb-6" />
                        <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 uppercase tracking-tighter mb-2 text-center">
                            Súmula Digital Pro
                        </h1>
                        <p className="text-slate-400 font-mono text-sm tracking-widest mb-12 text-center">
                            <Database size={14} className="inline mr-1 text-green-500"/> SISTEMA OFICIAL DE ARBITRAGEM E TORNEIOS
                        </p>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                            <div className="bg-[#0d0d0d] border border-neutral-800 rounded-3xl p-8 flex flex-col items-center text-center shadow-xl hover:border-emerald-500/50 transition-all group cursor-pointer" onClick={()=>setAppState('QUICK_SETUP')}>
                                <div className="bg-emerald-500/10 p-4 rounded-full mb-6 group-hover:scale-110 transition-transform"><Zap size={40} className="text-emerald-500"/></div>
                                <h2 className="text-2xl font-black text-white uppercase mb-2">Jogo Rápido</h2>
                                <p className="text-slate-500 text-sm mb-6">Inicie uma partida avulsa rapidamente. Sem compromisso de campeonato.</p>
                                <button className="mt-auto bg-emerald-600 text-white font-bold uppercase tracking-widest py-3 px-8 rounded-xl w-full">Iniciar Partida</button>
                            </div>
                            <div className="bg-[#0d0d0d] border border-neutral-800 rounded-3xl p-8 flex flex-col items-center text-center shadow-xl hover:border-blue-500/50 transition-all group cursor-pointer" onClick={()=>setAppState('TOURNAMENT_LIST')}>
                                <div className="bg-blue-500/10 p-4 rounded-full mb-6 group-hover:scale-110 transition-transform"><Trophy size={40} className="text-blue-500"/></div>
                                <h2 className="text-2xl font-black text-white uppercase mb-2">Modo Torneio</h2>
                                <p className="text-slate-500 text-sm mb-6">Crie ligas de pontos corridos ou copas mata-mata com tabelas automáticas.</p>
                                <button className="mt-auto bg-blue-600 text-white font-bold uppercase tracking-widest py-3 px-8 rounded-xl w-full">Gerir Torneios</button>
                            </div>
                        </div>

                        <button onClick={()=>setAppState('HISTORY')} className="mt-10 px-8 py-3 rounded-full border border-neutral-800 text-slate-400 font-bold uppercase tracking-widest hover:bg-[#111] hover:text-white transition-colors flex items-center gap-2">
                            <HistoryIcon size={18}/> Acessar Histórico Geral
                        </button>
                    </div>
                    <FooterCredits />
                </div>
            );

            if (appState === 'QUICK_SETUP') return (
                <div className="min-h-screen p-2 md:p-6 animate-fade flex flex-col">
                    <div className="max-w-5xl mx-auto space-y-4 flex-1 w-full">
                        {showBulkAdd && (
                            <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
                                <div className="bg-[#0d0d0d] border border-neutral-800 w-full max-w-lg rounded-2xl p-6 shadow-2xl animate-fade">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-black uppercase text-white flex items-center gap-2"><ListPlus size={20} className="text-blue-500" /> Lista de Jogadores</h3>
                                        <button onClick={()=>setShowBulkAdd(null)} className="text-neutral-500 hover:text-white transition-colors"><XCircle size={24}/></button>
                                    </div>
                                    <p className="text-[10px] text-neutral-400 mb-4 uppercase font-bold tracking-widest">Cole um nome por linha (Ex: 10 - Neymar ou apenas Neymar)</p>
                                    <textarea className="w-full h-64 bg-black border border-neutral-800 rounded-xl p-4 text-sm font-mono text-white outline-none focus:border-blue-500 transition-all" placeholder="Exemplo:&#10;10 - Vinicius Jr&#10;Rodrygo" value={bulkInput} onChange={e=>setBulkInput(e.target.value)}></textarea>
                                    <div className="mt-6 flex gap-3">
                                        <button onClick={()=>setShowBulkAdd(null)} className="flex-1 py-3 rounded-xl border border-neutral-800 font-bold text-xs uppercase hover:bg-neutral-900">Cancelar</button>
                                        <button onClick={()=>processBulkAdd(showBulkAdd)} className="flex-1 py-3 bg-blue-600 rounded-xl font-black text-xs uppercase shadow-lg shadow-blue-900/20 active:scale-95">Importar Lista</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="bg-[#0d0d0d] p-4 md:p-6 rounded-2xl border border-neutral-800 flex flex-col md:flex-row justify-between items-center gap-4 relative">
                            <div className="absolute top-0 left-0 w-full h-1 bg-jamaica-gradient rounded-t-2xl"></div>
                            <div className="text-center md:text-left">
                                <h1 className="text-xl md:text-2xl font-black text-white uppercase tracking-tighter flex items-center justify-center md:justify-start gap-2"><Zap className="text-emerald-500"/> Jogo Rápido</h1>
                            </div>
                            <div className="flex gap-2">
                                <div className="bg-black/50 p-2 rounded-xl border border-neutral-800 flex gap-2">
                                    <div className="flex flex-col"><label className="text-[8px] text-neutral-500 font-bold text-center uppercase">Tempo</label><input type="number" className="w-10 bg-transparent text-center text-sm font-bold text-white outline-none" value={matchConfig.durationMinutes} onChange={e=>setMatchConfig(p=>({...p, durationMinutes: parseInt(e.target.value)||0}))} /></div>
                                    <div className="w-px bg-neutral-800 h-6 my-auto"></div>
                                    <div className="flex flex-col"><label className="text-[8px] text-neutral-500 font-bold text-center uppercase">Gols</label><input type="number" className="w-10 bg-transparent text-center text-sm font-bold text-white outline-none" value={matchConfig.goalLimit} onChange={e=>setMatchConfig(p=>({...p, goalLimit: parseInt(e.target.value)||0}))} /></div>
                                </div>
                                <button onClick={()=>setAppState('SETUP')} className="p-3 bg-[#111] rounded-xl border border-neutral-800 text-slate-400 active:scale-95"><ArrowLeft size={20}/></button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            {['A', 'B'].map((t) => (
                                <div key={t} className="bg-[#0d0d0d] rounded-2xl border border-neutral-800 flex flex-col overflow-visible shadow-lg animate-fade">
                                    <div className={`p-3 md:p-5 border-b border-neutral-800 flex items-center gap-4 ${t==='A'?'bg-green-500/5':'bg-yellow-500/5'}`}>
                                        <div className="relative">
                                            <button onClick={()=>setActiveFlagPicker(activeFlagPicker===t?null:t)} className="w-12 h-8 md:w-16 md:h-11 shadow-lg active:scale-90 transition-transform"><FlagImage code={teams[t].flag} className="w-full h-full" /></button>
                                            {activeFlagPicker===t && (
                                                <div className="absolute top-12 left-0 z-50 bg-[#1a1a1a] border border-neutral-700 rounded-xl p-2 grid grid-cols-4 gap-2 w-64 h-48 overflow-y-auto no-scrollbar shadow-2xl">
                                                    {COUNTRY_FLAGS.map(c=>(<button key={c.code} onClick={()=>{setTeams(p=>({...p,[t]:{...p[t],flag:c.code}}));setActiveFlagPicker(null)}} className="p-1 hover:bg-neutral-800 rounded-lg"><FlagImage code={c.code} className="w-full h-7" /></button>))}
                                                </div>
                                            )}
                                        </div>
                                        <input className="bg-transparent text-xl md:text-3xl font-black text-white outline-none w-full uppercase placeholder-neutral-800" value={teams[t].name} onChange={e=>setTeams(p=>({...p,[t]:{...p[t],name:e.target.value.toUpperCase()}}))} placeholder="NOME DO TIME" />
                                    </div>
                                    <div className="p-4 bg-black/20 border-b border-neutral-800 space-y-3">
                                        <div className="flex gap-2">
                                            <input type="number" placeholder="Nº" className="w-14 bg-[#111] border border-neutral-800 rounded-lg p-2 text-center text-sm text-white font-mono" value={newPlayer[t].number} onChange={e=>setNewPlayer(p=>({...p,[t]:{...p[t],number:e.target.value}}))} />
                                            <input type="text" placeholder="NOME DO ATLETA" className="flex-1 bg-[#111] border border-neutral-800 rounded-lg p-2 text-sm text-white uppercase font-bold" value={newPlayer[t].name} onChange={e=>setNewPlayer(p=>({...p,[t]:{...p[t],name:e.target.value}}))} />
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="number" placeholder="CA ANT." className="flex-1 bg-[#111] border border-neutral-800 rounded-lg p-2 text-xs text-yellow-400 font-bold" value={newPlayer[t].hist} onChange={e=>setNewPlayer(p=>({...p,[t]:{...p[t],hist:e.target.value}}))} />
                                            <div className="flex gap-1">
                                                <button onClick={()=>setShowBulkAdd(t)} className="px-3 py-2 bg-neutral-800 text-blue-400 rounded-lg active:scale-90" title="Lista em Massa"><ListPlus size={18}/></button>
                                                <button onClick={()=>{const d=newPlayer[t]; if(d.name&&d.number) {const np={id:Math.random().toString(36).substr(2,9),name:d.name.toUpperCase(),number:parseInt(d.number),goals:0,assists:0,fouls:0,yellows:0,reds:0,historicYellows:parseInt(d.hist)||0}; setTeams(p=>({...p,[t]:{...p[t],players:[...p[t].players,np]}})); setNewPlayer(p=>({...p,[t]:{name:'',number:'',hist:''}}));}}} className={`px-5 py-2 rounded-lg font-black text-black active:scale-95 ${t==='A'?'bg-green-500':'bg-yellow-400'}`}><UserPlus size={18}/></button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-3 h-52 overflow-y-auto space-y-2 no-scrollbar">
                                        {teams[t].players.map(p=>(
                                            <div key={p.id} className="flex justify-between items-center bg-[#111] p-3 rounded-xl border border-neutral-800 animate-slide">
                                                <div className="flex items-center gap-3"><span className={`font-mono text-xs px-2 py-1 rounded text-black font-black ${t==='A'?'bg-green-500':'bg-yellow-400'}`}>{p.number}</span><span className="font-bold text-sm text-white uppercase">{p.name}</span></div>
                                                <button onClick={()=>setTeams(p_=>({...p_,[t]:{...p_[t],players:p_[t].players.filter(pl=>pl.id!==p.id)}}))} className="p-2 text-neutral-600 hover:text-red-500 active:scale-90"><Trash2 size={16}/></button>
                                            </div>
                                        ))}
                                        {teams[t].players.length === 0 && <div className="h-full flex flex-col items-center justify-center text-neutral-800 py-10 uppercase font-black opacity-20"><Shield size={40}/><span className="text-xs">Time Vazio</span></div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={()=>{ if(!teams.A.name||!teams.B.name) return alert("Preencha o nome dos times!"); playSfx('start'); setTime(matchConfig.durationMinutes*60); setAppState('MATCH'); }} className="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 text-white text-xl font-black py-5 rounded-2xl shadow-xl active:scale-95 uppercase tracking-widest border border-emerald-400/30">Começar Jogo Rápido</button>
                    </div>
                    <FooterCredits />
                </div>
            );

            if (appState === 'TOURNAMENT_LIST') return (
                <div className="min-h-screen p-4 md:p-8 animate-fade flex flex-col">
                    <div className="max-w-4xl mx-auto space-y-6 flex-1 w-full">
                        <div className="flex justify-between items-center border-b border-neutral-800 pb-4">
                            <h1 className="text-2xl md:text-3xl font-black text-white uppercase flex items-center gap-3"><Trophy size={32} className="text-blue-500"/> MEUS TORNEIOS</h1>
                            <button onClick={()=>setAppState('SETUP')} className="p-3 bg-neutral-900 border border-neutral-800 rounded-xl active:scale-90"><ArrowLeft size={20}/></button>
                        </div>
                        
                        <div className="flex justify-end mb-6">
                            <button onClick={()=>setAppState('TOURNAMENT_CREATE')} className="bg-blue-600 text-white font-bold px-6 py-3 rounded-xl flex items-center gap-2 uppercase tracking-widest text-sm shadow-lg shadow-blue-900/30 hover:bg-blue-500 transition-colors active:scale-95">
                                <Plus size={16}/> Criar Torneio
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {tournaments.map(t => (
                                <div key={t.id} className="bg-[#0d0d0d] p-6 rounded-2xl border border-neutral-800 hover:border-blue-500/50 transition-all group flex flex-col justify-between shadow-xl">
                                    <div>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className={`text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded ${t.format==='LEAGUE'?'bg-emerald-500/10 text-emerald-400':'bg-amber-500/10 text-amber-400'}`}>
                                                {t.format === 'LEAGUE' ? 'Liga (Pontos Corridos)' : 'Copa (Mata-Mata)'}
                                            </span>
                                            <span className="text-[10px] text-neutral-500 font-mono">{new Date(t.createdAt).toLocaleDateString('pt-BR')}</span>
                                        </div>
                                        <h2 className="text-2xl font-black text-white uppercase mb-4">{t.name}</h2>
                                        <p className="text-sm text-neutral-400 flex items-center gap-2"><UserPlus size={16}/> {t.teams.length} Times Inscritos</p>
                                    </div>
                                    <div className="mt-6 flex justify-between items-center border-t border-neutral-800 pt-4">
                                        <span className="text-xs font-bold text-neutral-500 uppercase">{t.matches.filter(m=>m.played).length} / {t.matches.length} Jogos</span>
                                        <div className="flex gap-2">
                                            <button onClick={()=>{ if(confirm("Apagar o torneio apaga todos os jogos dele. Confirma?")) deleteDoc(doc(db, 'artifacts', appRootId, 'users', user.uid, 'tournaments', t.id)); }} className="p-2 text-neutral-600 hover:text-red-500"><Trash2 size={18}/></button>
                                            <button onClick={()=>{setActiveTourney(t); setTourneyTab('JOGOS'); setAppState('TOURNAMENT_DASH');}} className="bg-neutral-800 text-blue-400 font-bold px-4 py-2 rounded-lg text-xs uppercase active:scale-95 flex items-center gap-1">Painel <ArrowRight size={14}/></button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {tournaments.length === 0 && <div className="col-span-full text-center py-20 bg-[#0d0d0d] rounded-3xl border border-neutral-900 text-neutral-600 font-mono italic">Você não possui torneios ativos.</div>}
                        </div>
                    </div>
                    <FooterCredits />
                </div>
            );

            if (appState === 'TOURNAMENT_CREATE') return (
                <div className="min-h-screen p-2 md:p-6 animate-fade flex flex-col">
                    <div className="max-w-4xl mx-auto space-y-6 flex-1 w-full">
                        <div className="flex justify-between items-center border-b border-neutral-800 pb-4">
                            <h1 className="text-2xl md:text-3xl font-black text-white uppercase flex items-center gap-3"><Trophy size={28} className="text-blue-500"/> NOVO TORNEIO</h1>
                            <button onClick={()=>setAppState('TOURNAMENT_LIST')} className="p-3 bg-neutral-900 border border-neutral-800 rounded-xl active:scale-90"><ArrowLeft size={20}/></button>
                        </div>

                        <div className="bg-[#0d0d0d] p-6 rounded-2xl border border-neutral-800 shadow-xl space-y-6">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-neutral-400 uppercase tracking-widest">Nome da Competição</label>
                                <input type="text" className="w-full bg-[#111] border border-neutral-800 rounded-xl p-4 text-white text-xl font-bold uppercase outline-none focus:border-blue-500" placeholder="Ex: Copa Interclasse 2026" value={newTourney.name} onChange={e=>setNewTourney({...newTourney, name: e.target.value})}/>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-neutral-400 uppercase tracking-widest">Formato</label>
                                    <div className="flex gap-2">
                                        <button onClick={()=>setNewTourney({...newTourney, format: 'LEAGUE'})} className={`flex-1 py-3 rounded-xl border font-bold text-sm uppercase transition-all flex justify-center items-center gap-2 ${newTourney.format==='LEAGUE'?'bg-emerald-600 border-emerald-500 text-white':'bg-[#111] border-neutral-800 text-neutral-500'}`}><ListNumbers size={18}/> Pontos Corridos</button>
                                        <button onClick={()=>setNewTourney({...newTourney, format: 'KNOCKOUT'})} className={`flex-1 py-3 rounded-xl border font-bold text-sm uppercase transition-all flex justify-center items-center gap-2 ${newTourney.format==='KNOCKOUT'?'bg-amber-600 border-amber-500 text-white':'bg-[#111] border-neutral-800 text-neutral-500'}`}><BracketsAngle size={18}/> Mata-Mata</button>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs font-bold text-neutral-400 uppercase tracking-widest">Rodadas</label>
                                    <div className="flex gap-2">
                                        <button onClick={()=>setNewTourney({...newTourney, doubleRound: false})} className={`flex-1 py-3 rounded-xl border font-bold text-sm uppercase transition-all ${!newTourney.doubleRound?'bg-blue-600 border-blue-500 text-white':'bg-[#111] border-neutral-800 text-neutral-500'}`}>Turno Único</button>
                                        <button onClick={()=>setNewTourney({...newTourney, doubleRound: true})} className={`flex-1 py-3 rounded-xl border font-bold text-sm uppercase transition-all ${newTourney.doubleRound?'bg-blue-600 border-blue-500 text-white':'bg-[#111] border-neutral-800 text-neutral-500'}`}>Ida e Volta</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-[#0d0d0d] p-6 rounded-2xl border border-neutral-800 shadow-xl space-y-6">
                            <h2 className="text-lg font-black text-white uppercase tracking-widest flex items-center gap-2"><Shield size={20} className="text-blue-500"/> Cadastro de Times ({newTourney.teams.length})</h2>
                            
                            <div className="bg-[#111] p-4 rounded-xl border border-neutral-800 flex flex-col gap-4">
                                <div className="flex gap-4 items-center">
                                    <div className="relative">
                                        <button onClick={()=>setActiveFlagPicker(activeFlagPicker==='T'?null:'T')} className="w-12 h-8 md:w-16 md:h-11 shadow-lg active:scale-90 transition-transform"><FlagImage code={tTeamFlag} className="w-full h-full" /></button>
                                        {activeFlagPicker==='T' && (
                                            <div className="absolute top-12 left-0 z-50 bg-[#1a1a1a] border border-neutral-700 rounded-xl p-2 grid grid-cols-4 gap-2 w-64 h-48 overflow-y-auto no-scrollbar shadow-2xl">
                                                {COUNTRY_FLAGS.map(c=>(<button key={c.code} onClick={()=>{setTTeamFlag(c.code);setActiveFlagPicker(null)}} className="p-1 hover:bg-neutral-800 rounded-lg"><FlagImage code={c.code} className="w-full h-7" /></button>))}
                                            </div>
                                        )}
                                    </div>
                                    <input type="text" className="flex-1 bg-black border border-neutral-800 rounded-xl p-3 text-white uppercase font-bold outline-none focus:border-blue-500" placeholder="Nome do Time" value={tTeamName} onChange={e=>setTTeamName(e.target.value)} />
                                </div>
                                <div>
                                    <label className="text-[10px] text-neutral-500 uppercase font-bold tracking-widest mb-1 block">Elenco (Um jogador por linha. Ex: 10 Neymar)</label>
                                    <textarea className="w-full h-32 bg-black border border-neutral-800 rounded-xl p-3 text-sm font-mono text-neutral-300 outline-none focus:border-blue-500" placeholder="Insira os jogadores..." value={tTeamPlayers} onChange={e=>setTTeamPlayers(e.target.value)}></textarea>
                                </div>
                                <button onClick={handleAddTourneyTeam} className="w-full py-3 bg-blue-600 text-white font-black uppercase text-xs rounded-xl active:scale-95 shadow-lg shadow-blue-900/20">Adicionar Time ao Torneio</button>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                {newTourney.teams.map(t => (
                                    <div key={t.id} className="bg-[#111] border border-neutral-800 p-3 rounded-xl flex items-center justify-between">
                                        <div className="flex items-center gap-2"><FlagImage code={t.flag} className="w-6 h-4"/> <div className="flex flex-col"><span className="text-xs font-bold text-white uppercase truncate max-w-[100px]">{t.name}</span><span className="text-[9px] text-neutral-500 font-mono">{t.players.length} Jogadores</span></div></div>
                                        <button onClick={()=>setNewTourney(p=>({...p, teams: p.teams.filter(xt=>xt.id!==t.id)}))} className="text-neutral-600 hover:text-red-500"><Trash2 size={16}/></button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <button onClick={handleGenerateTournament} disabled={isSaving} className="w-full py-5 bg-gradient-to-r from-emerald-600 to-emerald-500 text-white font-black text-lg uppercase tracking-widest rounded-2xl shadow-xl active:scale-95 disabled:opacity-50">
                            {isSaving ? 'Gerando...' : 'GERAR TABELA OFICIAL'}
                        </button>
                    </div>
                    <FooterCredits />
                </div>
            );

            if (appState === 'TOURNAMENT_DASH' && activeTourney) {
                const isLeague = activeTourney.format === 'LEAGUE';
                return (
                    <div className="min-h-screen p-2 md:p-6 animate-fade flex flex-col">
                        
                        {/* --- MODAL DE ESTATÍSTICAS DO JOGADOR --- */}
                        {selectedPlayerStats && (
                            <div className="fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-4 animate-fade">
                                <div className="bg-[#0d0d0d] border border-neutral-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl relative">
                                    <button onClick={() => setSelectedPlayerStats(null)} className="absolute top-4 right-4 text-neutral-500 hover:text-white transition-colors"><XCircle size={24}/></button>
                                    <div className="text-center mb-6 mt-2">
                                        <div className="w-16 h-16 bg-neutral-900 border border-neutral-800 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl font-black text-neutral-500">#{selectedPlayerStats.number}</div>
                                        <h3 className="text-xl font-black uppercase text-white truncate px-2">{selectedPlayerStats.name}</h3>
                                        <p className="text-[10px] text-neutral-500 font-mono mt-1 tracking-widest">ÍNDICE DE DESEMPENHO</p>
                                    </div>
                                    <div className="space-y-2">
                                        <PlayerBar label="Gols Marcados" value={selectedPlayerStats.goals} max={10} color="bg-emerald-500" />
                                        <PlayerBar label="Assistências" value={selectedPlayerStats.assists} max={10} color="bg-blue-500" />
                                        <PlayerBar label="Faltas Cometidas" value={selectedPlayerStats.fouls} max={15} color="bg-orange-500" />
                                        <PlayerBar label="Cartões Amarelos" value={selectedPlayerStats.yellows} max={5} color="bg-yellow-400" />
                                        <PlayerBar label="Cartões Vermelhos" value={selectedPlayerStats.reds} max={2} color="bg-red-500" />
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="max-w-5xl mx-auto space-y-4 flex-1 w-full">
                            <div className="flex justify-between items-center bg-[#0d0d0d] p-4 rounded-2xl border border-neutral-800 shadow-xl">
                                <div className="flex items-center gap-3">
                                    <div className="p-3 bg-blue-500/10 rounded-xl"><Trophy size={24} className="text-blue-500"/></div>
                                    <div>
                                        <h1 className="text-xl md:text-2xl font-black text-white uppercase">{activeTourney.name}</h1>
                                        <p className="text-[10px] text-neutral-500 font-mono uppercase">{isLeague ? 'PONTOS CORRIDOS' : 'MATA-MATA'} • {activeTourney.teams.length} TIMES</p>
                                    </div>
                                </div>
                                <button onClick={()=>setAppState('TOURNAMENT_LIST')} className="p-3 bg-neutral-900 border border-neutral-800 rounded-xl active:scale-90"><ArrowLeft size={20}/></button>
                            </div>

                            {/* TABS */}
                            <div className="flex bg-[#0d0d0d] p-1.5 rounded-xl border border-neutral-800">
                                {isLeague && <button onClick={()=>setTourneyTab('TABLE')} className={`flex-1 py-2.5 rounded-lg text-xs font-black uppercase transition-all ${tourneyTab==='TABLE'?'bg-blue-600 text-white shadow-lg':'text-neutral-500 hover:bg-neutral-900'}`}>Classificação</button>}
                                <button onClick={()=>setTourneyTab('JOGOS')} className={`flex-1 py-2.5 rounded-lg text-xs font-black uppercase transition-all ${tourneyTab==='JOGOS'?'bg-blue-600 text-white shadow-lg':'text-neutral-500 hover:bg-neutral-900'}`}>Confrontos</button>
                                <button onClick={()=>setTourneyTab('STATS')} className={`flex-1 py-2.5 rounded-lg text-xs font-black uppercase transition-all ${tourneyTab==='STATS'?'bg-blue-600 text-white shadow-lg':'text-neutral-500 hover:bg-neutral-900'}`}>Estatísticas</button>
                            </div>

                            {/* CONTEÚDO DA TAB */}
                            {tourneyTab === 'TABLE' && isLeague && (
                                <div className="bg-[#0d0d0d] border border-neutral-800 rounded-2xl overflow-hidden shadow-xl animate-fade">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm text-slate-300">
                                            <thead className="bg-neutral-900/80 text-[10px] uppercase font-black text-neutral-500">
                                                <tr>
                                                    <th className="px-4 py-4 text-center">Pos</th>
                                                    <th className="px-4 py-4">Time</th>
                                                    <th className="px-3 py-4 text-center">Pts</th>
                                                    <th className="px-3 py-4 text-center">P</th>
                                                    <th className="px-3 py-4 text-center">V</th>
                                                    <th className="px-3 py-4 text-center">E</th>
                                                    <th className="px-3 py-4 text-center">D</th>
                                                    <th className="px-3 py-4 text-center">GP</th>
                                                    <th className="px-3 py-4 text-center">GC</th>
                                                    <th className="px-3 py-4 text-center">SG</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-neutral-800/50">
                                                {getTourneyStandings(activeTourney).map((team, idx) => (
                                                    <tr key={team.id} className="hover:bg-neutral-800/30 transition-colors">
                                                        <td className="px-4 py-3 text-center font-bold text-neutral-500">{idx + 1}º</td>
                                                        <td className="px-4 py-3 font-bold text-white flex items-center gap-2">
                                                            <FlagImage code={team.flag} className="w-6 h-4" />
                                                            <span className="truncate max-w-[100px] md:max-w-[200px]">{team.name}</span>
                                                        </td>
                                                        <td className="px-3 py-3 text-center font-black text-green-500">{team.pts}</td>
                                                        <td className="px-3 py-3 text-center font-mono">{team.p}</td>
                                                        <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.v}</td>
                                                        <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.e}</td>
                                                        <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.d}</td>
                                                        <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.gp}</td>
                                                        <td className="px-3 py-3 text-center font-mono text-neutral-400">{team.gc}</td>
                                                        <td className="px-3 py-3 text-center font-mono font-bold text-white">{team.gp - team.gc}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {tourneyTab === 'JOGOS' && (
                                <div className="space-y-6 animate-fade">
                                    {Object.entries(activeTourney.matches.reduce((acc, m) => {
                                        if(!acc[m.roundName]) acc[m.roundName] = [];
                                        acc[m.roundName].push(m); return acc;
                                    }, {})).map(([roundName, matches]) => (
                                        <div key={roundName} className="bg-[#0d0d0d] border border-neutral-800 rounded-2xl p-4 shadow-lg">
                                            <h3 className="text-xs font-black text-neutral-500 uppercase tracking-widest mb-4 border-b border-neutral-800 pb-2">{roundName}</h3>
                                            <div className="space-y-2">
                                                {matches.map(m => {
                                                    const hT = activeTourney.teams.find(t=>t.id===m.homeId);
                                                    const aT = activeTourney.teams.find(t=>t.id===m.awayId);
                                                    if(!hT || !aT) return null;
                                                    return (
                                                        <div key={m.id} className="flex flex-col md:flex-row items-center justify-between bg-[#111] border border-neutral-800 rounded-xl p-3 gap-3 hover:border-neutral-700 transition-colors">
                                                            <div className="flex items-center gap-3 w-full md:w-auto flex-1">
                                                                <div className="flex-1 flex justify-end items-center gap-2"><span className="text-xs font-bold text-white uppercase truncate">{hT.name}</span><FlagImage code={hT.flag} className="w-6 h-4"/></div>
                                                                
                                                                {m.played ? (
                                                                    <div className="px-3 py-1 bg-black rounded-lg border border-neutral-800 text-lg font-black font-mono w-16 text-center">{m.homeGoals} <span className="text-neutral-600 text-sm">x</span> {m.awayGoals}</div>
                                                                ) : (
                                                                    <div className="px-3 py-1 bg-black rounded-lg border border-neutral-800 text-xs font-black font-mono w-16 text-center text-neutral-600">-- x --</div>
                                                                )}

                                                                <div className="flex-1 flex justify-start items-center gap-2"><FlagImage code={aT.flag} className="w-6 h-4"/><span className="text-xs font-bold text-white uppercase truncate">{aT.name}</span></div>
                                                            </div>
                                                            
                                                            {!m.played && (
                                                                <button onClick={()=>startTourneyMatch(m)} className="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 text-white font-black text-[10px] uppercase tracking-widest px-4 py-2 rounded-lg flex items-center justify-center gap-1 active:scale-95 shadow-lg shadow-emerald-900/20"><Play size={12}/> Jogar</button>
                                                            )}
                                                            {m.played && (
                                                                <div className="w-full md:w-auto flex justify-center"><span className="text-[10px] font-bold text-neutral-500 uppercase bg-neutral-900 px-3 py-1 rounded-lg">Encerrado</span></div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}

                                    {!isLeague && (
                                        <button onClick={handleAdvanceKnockout} className="w-full py-4 bg-amber-600 text-white font-black uppercase text-sm rounded-xl shadow-xl active:scale-95 flex items-center justify-center gap-2">
                                            <Swords size={20}/> Avançar Vencedores (Gerar Próx. Fase)
                                        </button>
                                    )}
                                </div>
                            )}

                            {tourneyTab === 'STATS' && (
                                <div className="bg-[#0d0d0d] border border-neutral-800 rounded-2xl p-6 shadow-xl animate-fade">
                                    <p className="text-[10px] text-neutral-500 font-bold uppercase tracking-widest mb-6 text-center">Toque em um jogador para ver o gráfico de desempenho</p>
                                    <h3 className="text-lg font-black text-white uppercase mb-4 flex items-center gap-2"><Target className="text-emerald-500"/> Artilharia Geral</h3>
                                    <div className="space-y-3">
                                        {(() => {
                                            const allP = [];
                                            activeTourney.teams.forEach(t => t.players.forEach(p => allP.push({...p, teamName: t.name, flag: t.flag})));
                                            const topScorers = allP.filter(p => p.goals > 0).sort((a,b) => b.goals - a.goals);
                                            if(topScorers.length === 0) return <p className="text-neutral-500 text-sm font-mono italic">Nenhum gol marcado no torneio.</p>;
                                            return topScorers.map((p, idx) => (
                                                <div key={p.id} onClick={() => setSelectedPlayerStats(p)} className="flex items-center justify-between bg-[#111] hover:bg-neutral-900 border border-neutral-800 p-3 rounded-xl cursor-pointer transition-colors">
                                                    <div className="flex items-center gap-3">
                                                        <span className="w-6 text-center font-bold text-neutral-500 text-sm">{idx+1}º</span>
                                                        <FlagImage code={p.flag} className="w-6 h-4"/>
                                                        <div className="flex flex-col">
                                                            <span className="font-bold text-white text-sm uppercase flex items-center gap-1">{p.name} <Activity size={12} className="text-neutral-600"/></span>
                                                            <span className="text-[9px] text-neutral-500 uppercase">{p.teamName}</span>
                                                        </div>
                                                    </div>
                                                    <div className="text-2xl font-black text-emerald-500 font-mono">{p.goals} <span className="text-xs text-neutral-500">Gols</span></div>
                                                </div>
                                            ));
                                        })()}
                                    </div>
                                </div>
                            )}
                        </div>
                        <FooterCredits />
                    </div>
                );
            }

            if (appState === 'MATCH') return (
                <div className="min-h-screen p-2 md:p-4 flex flex-col gap-3">
                    <div className="flex-1 flex flex-col gap-3 w-full">
                        <div className={`bg-[#0d0d0d] p-4 rounded-2xl border border-neutral-800 shadow-2xl flex flex-col md:flex-row justify-between items-center gap-4 relative overflow-hidden ${isUndoMode?'undo-active':''}`}>
                            <div className="absolute top-0 left-0 w-full h-1 bg-jamaica-gradient"></div>
                            
                            {activeTourneyMatch && <div className="absolute top-0 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[9px] font-bold px-4 py-0.5 rounded-b-lg shadow-md uppercase tracking-widest">{activeTourney.name}</div>}
                            
                            <div className="flex flex-col md:hidden w-full gap-3 mt-2">
                                <div className="flex justify-between items-center w-full">
                                    <button onClick={()=>setIsUndoMode(!isUndoMode)} className={`px-2.5 py-2 rounded-lg text-[10px] font-black uppercase flex items-center gap-1.5 border transition-all shadow-md active:scale-95 ${isUndoMode?'bg-red-600 text-white border-red-500 animate-pulse':'bg-neutral-800 border-neutral-700 text-neutral-400'}`}>
                                        <Eraser size={16}/> {isUndoMode?'REMOVER EVENTOS':'CORRIGIR ERRO'}
                                    </button>
                                    <div className="flex gap-2">
                                        <button onClick={handleResetMatch} className="p-2 rounded-lg bg-neutral-800 border border-neutral-700 text-slate-300 active:scale-90" title="Zerar Placar e Tempo"><ArrowsClockwise size={18}/></button>
                                        <button onClick={saveMatch} disabled={isSaving} className="px-3 py-2 rounded-lg bg-red-600 text-white font-bold text-[10px] flex items-center gap-1 shadow-lg active:scale-90">{isSaving?<Clock size={14}/>:<Flag size={14}/>} FIM</button>
